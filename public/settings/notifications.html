<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="시설공사 통합관리시스템 — 알림 설정" />
  <title>알림 설정 — CLMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <div id="header"></div>

  <main class="max-w-md mx-auto px-4 py-6 clms-fade-in">
    <a href="/dashboard.html" class="text-slate-400 hover:text-navy text-sm">← 대시보드</a>
    <h1 class="text-xl font-bold text-navy-dark mt-1">알림 설정</h1>

    <div id="content" hidden>
      <!-- 푸시 알림 권한 -->
      <section class="bg-white rounded-2xl border border-slate-200 p-5 mt-4">
        <h2 class="font-bold text-navy-dark">모바일 푸시 알림</h2>
        <p class="text-xs text-slate-500 mt-1">브라우저 알림 권한을 허용하면 앱이 닫혀 있어도 알림을 받을 수 있습니다.</p>
        <div class="flex items-center justify-between mt-3">
          <span id="push-status" class="text-sm font-medium"></span>
          <button id="btn-push" class="px-4 py-2 rounded-lg bg-navy text-white text-sm font-semibold hover:bg-navy-light">권한 허용</button>
        </div>
        <p id="ios-note" hidden class="text-[11px] text-amber-700 bg-amber-50 rounded-lg px-3 py-2 mt-2">
          iOS는 Safari에서 "홈 화면에 추가"로 설치한 후에만 푸시 알림을 받을 수 있습니다. (iOS 16.4+)
        </p>
      </section>

      <!-- 알림 종류 -->
      <section class="bg-white rounded-2xl border border-slate-200 p-5 mt-4">
        <h2 class="font-bold text-navy-dark">알림 종류</h2>
        <p class="text-xs text-slate-500 mt-1">받고 싶은 알림 종류를 선택하세요. 변경 즉시 저장됩니다.</p>
        <div id="type-toggles" class="mt-3 divide-y divide-slate-100"></div>
      </section>

      <!-- 야간 차단 -->
      <section class="bg-white rounded-2xl border border-slate-200 p-5 mt-4">
        <h2 class="font-bold text-navy-dark">야간 알림 차단</h2>
        <div class="flex items-center justify-between mt-2">
          <span class="text-sm text-slate-600">22시 ~ 07시 알림 차단</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="night-toggle" class="sr-only peer" />
            <div class="w-11 h-6 bg-slate-200 rounded-full peer-checked:bg-navy transition-colors"></div>
            <div class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
          </label>
        </div>
      </section>
    </div>

    <div id="loading" class="bg-white rounded-2xl border border-slate-200 p-10 text-center mt-4">
      <span class="clms-spinner clms-spinner--navy"></span>
      <p class="text-sm text-slate-400 mt-2">불러오는 중...</p>
    </div>
  </main>
  <div id="footer"></div>

  <script type="module">
    import '/js/app.js';
    import { mountAppHeader, mountFooter, toast } from '/js/components/layout.js';
    import { requireActive, getCurrentUser } from '/js/auth.js';
    import { Db } from '/js/backend.js';
    import { NOTIFICATION_TYPES, DEFAULT_NOTIFICATION_SETTINGS } from '/js/constants.js';
    import { getNotificationSettings } from '/js/notifications.js';
    import { isPushSupported, getPermissionStatus, requestPermission } from '/js/push.js';

    (async () => {
      const user = await requireActive();
      if (!user) return;
      mountAppHeader(document.getElementById('header'), { user });
      mountFooter(document.getElementById('footer'));

      const settings = getNotificationSettings(user);

      // 알림 종류 토글
      const typeBox = document.getElementById('type-toggles');
      typeBox.innerHTML = Object.entries(NOTIFICATION_TYPES).map(([key, t]) => `
        <div class="flex items-center justify-between py-2.5">
          <span class="text-sm text-slate-700">${t.icon} ${t.label}</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" data-type="${key}" class="sr-only peer" ${settings[key] !== false ? 'checked' : ''} />
            <div class="w-11 h-6 bg-slate-200 rounded-full peer-checked:bg-navy transition-colors"></div>
            <div class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
          </label>
        </div>`).join('');

      document.getElementById('night-toggle').checked = !!settings.nightBlock;

      document.getElementById('loading').hidden = true;
      document.getElementById('content').hidden = false;

      async function persist() {
        const next = { ...DEFAULT_NOTIFICATION_SETTINGS };
        typeBox.querySelectorAll('[data-type]').forEach((cb) => { next[cb.dataset.type] = cb.checked; });
        next.nightBlock = document.getElementById('night-toggle').checked;
        await Db.updateUser(user.uid, { notificationSettings: next });
        await getCurrentUser({ force: true });
        toast('알림 설정이 저장되었습니다.', 'success', 1500);
      }
      typeBox.addEventListener('change', persist);
      document.getElementById('night-toggle').addEventListener('change', persist);

      // 푸시 권한
      const statusEl = document.getElementById('push-status');
      const pushBtn = document.getElementById('btn-push');
      const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
      if (isIOS) document.getElementById('ios-note').hidden = false;

      function refreshPush() {
        const s = getPermissionStatus();
        const map = {
          granted: ['알림 권한이 허용되어 있습니다.', 'text-emerald-600'],
          denied: ['알림 권한이 차단되었습니다. 브라우저 설정에서 변경하세요.', 'text-red-600'],
          default: ['알림 권한이 설정되지 않았습니다.', 'text-slate-500'],
          unsupported: ['이 브라우저는 푸시 알림을 지원하지 않습니다.', 'text-slate-400'],
        };
        const [text, cls] = map[s] || map.default;
        statusEl.textContent = text;
        statusEl.className = 'text-sm font-medium ' + cls;
        pushBtn.hidden = s === 'granted' || s === 'unsupported' || s === 'denied';
      }
      refreshPush();

      pushBtn.addEventListener('click', async () => {
        const result = await requestPermission();
        refreshPush();
        if (result === 'granted') toast('푸시 알림 권한이 허용되었습니다.', 'success');
        else if (result === 'denied') toast('알림 권한이 거부되었습니다.', 'warning');
      });

      if (!isPushSupported()) pushBtn.hidden = true;
    })();
  </script>
</body>
</html>
