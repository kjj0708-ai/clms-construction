<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="공사관리시스템 — 대시보드" />
  <title>대시보드 — CMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CMS" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <div id="header"></div>

  <main id="main" hidden class="max-w-3xl mx-auto px-4 py-6 clms-fade-in">

    <section class="bg-gradient-to-br from-navy to-navy-dark text-white rounded-2xl p-6 shadow-sm">
      <p class="text-white/60 text-sm">환영합니다</p>
      <h1 class="text-2xl font-bold mt-0.5"><span id="greet-name">사용자</span>님</h1>
      <p id="greet-sub" class="text-white/70 text-sm mt-1"></p>
    </section>

    <!-- 카테고리 탭: 공사 / 용역 -->
    <div class="mt-5">
      <div id="tabs-cat" class="inline-flex bg-slate-200 rounded-xl p-1 w-full">
        <button data-cat="공사" class="tab-cat flex-1 px-4 py-1.5 text-sm font-bold rounded-lg transition-all">
          공사 <span data-cat-count="공사" class="text-xs ml-0.5 opacity-70">0</span>
        </button>
        <button data-cat="용역" class="tab-cat flex-1 px-4 py-1.5 text-sm font-bold rounded-lg transition-all">
          용역 <span data-cat-count="용역" class="text-xs ml-0.5 opacity-70">0</span>
        </button>
      </div>

      <!-- 공사 하위 탭: 발주준비 / 공사중 / 준공 -->
      <div id="tabs-phase" class="flex gap-1.5 mt-3 flex-wrap">
        <button data-phase="발주준비" class="tab-phase px-3 py-1 text-xs font-bold rounded-full border transition-all">
          발주준비 <span data-phase-count="발주준비">0</span>
        </button>
        <button data-phase="공사중" class="tab-phase px-3 py-1 text-xs font-bold rounded-full border transition-all">
          공사중 <span data-phase-count="공사중">0</span>
        </button>
        <button data-phase="준공" class="tab-phase px-3 py-1 text-xs font-bold rounded-full border transition-all">
          준공 <span data-phase-count="준공">0</span>
        </button>
      </div>
    </div>

    <!-- 단계별 요약 카드 -->
    <div id="summary" hidden class="mt-3"></div>

    <div class="flex items-center justify-between mt-4 mb-2">
      <h2 class="text-sm font-bold text-slate-500">내 사업</h2>
      <a id="btn-new" href="/project-new.html" hidden
        class="text-xs font-bold text-white bg-navy hover:bg-navy-light rounded-lg px-3 py-1.5">+ 신규 사업</a>
    </div>
    <div id="list" class="space-y-2.5"></div>
    <div id="empty" hidden class="bg-white rounded-xl border border-slate-200 p-10 text-center text-sm text-slate-400"></div>

  </main>
  <div id="footer"></div>

  <script type="module">
    import '/js/app.js';
    import { mountAppHeader, mountFooter } from '/js/components/layout.js';
    import { escapeHtml } from '/js/components/link-renderer.js';
    import { requireActive } from '/js/auth.js';
    import { roleLabel, PROJECT_STATUS } from '/js/constants.js';
    import {
      listAccessibleProjects, canEditProjects, calcProgress, nextMilestone, formatDate,
      projectCategory, constructionPhase,
    } from '/js/projects.js';

    (async () => {
      const user = await requireActive();
      if (!user) return;

      mountAppHeader(document.getElementById('header'), { user });
      mountFooter(document.getElementById('footer'));
      document.getElementById('main').hidden = false;

      document.getElementById('greet-name').textContent = user.name || '사용자';
      document.getElementById('greet-sub').textContent = `${user.department || ''} · ${roleLabel(user.role)}`;
      if (canEditProjects(user)) document.getElementById('btn-new').hidden = false;

      const projects = await listAccessibleProjects(user);

      // 카테고리/단계 분류
      const byCat = { 공사: [], 용역: [] };
      for (const p of projects) byCat[projectCategory(p)].push(p);
      const byPhase = { 발주준비: [], 공사중: [], 준공: [] };
      for (const p of byCat['공사']) byPhase[constructionPhase(p)].push(p);

      // 카운트 반영
      document.querySelector('[data-cat-count="공사"]').textContent = byCat['공사'].length;
      document.querySelector('[data-cat-count="용역"]').textContent = byCat['용역'].length;
      document.querySelector('[data-phase-count="발주준비"]').textContent = byPhase['발주준비'].length;
      document.querySelector('[data-phase-count="공사중"]').textContent = byPhase['공사중'].length;
      document.querySelector('[data-phase-count="준공"]').textContent = byPhase['준공'].length;

      const listEl = document.getElementById('list');
      const emptyEl = document.getElementById('empty');
      const summaryEl = document.getElementById('summary');
      const tabsPhaseEl = document.getElementById('tabs-phase');

      const TAB_CAT_ACTIVE = 'bg-white text-navy-dark shadow-sm';
      const TAB_CAT_IDLE = 'text-slate-500 hover:text-slate-700';
      const TAB_PHASE_ACTIVE = 'bg-navy text-white border-navy';
      const TAB_PHASE_IDLE = 'bg-white text-slate-600 border-slate-200 hover:border-navy';

      // 초기 탭: 공사가 비어 있고 용역이 있으면 용역으로
      let curCat = (byCat['공사'].length === 0 && byCat['용역'].length > 0) ? '용역' : '공사';
      let curPhase = '발주준비';

      function renderTabs() {
        document.querySelectorAll('.tab-cat').forEach((btn) => {
          const active = btn.dataset.cat === curCat;
          btn.className = `tab-cat flex-1 px-4 py-1.5 text-sm font-bold rounded-lg transition-all ${active ? TAB_CAT_ACTIVE : TAB_CAT_IDLE}`;
        });
        tabsPhaseEl.hidden = curCat !== '공사';
        document.querySelectorAll('.tab-phase').forEach((btn) => {
          const active = btn.dataset.phase === curPhase;
          btn.className = `tab-phase px-3 py-1 text-xs font-bold rounded-full border transition-all ${active ? TAB_PHASE_ACTIVE : TAB_PHASE_IDLE}`;
        });
      }

      function summaryCard({ title, num, denom, color = 'bg-navy' }) {
        const pct = denom > 0 ? Math.round((num / denom) * 100) : 0;
        return `
          <div class="bg-white rounded-xl border border-slate-200 p-3">
            <div class="flex items-baseline justify-between">
              <div class="text-xs font-bold text-slate-500">${title}</div>
              <div class="text-xs text-slate-400">${pct}%</div>
            </div>
            <div class="text-sm font-bold text-navy-dark mt-1">
              전체 공사 <span class="text-navy-dark">${denom}</span>건 중 <span class="text-navy">${num}</span>건
            </div>
            <div class="mt-2 h-1.5 bg-slate-100 rounded-full overflow-hidden">
              <div class="h-full ${color}" style="width:${pct}%"></div>
            </div>
          </div>`;
      }

      function renderSummary() {
        if (curCat !== '공사') {
          summaryEl.hidden = true;
          summaryEl.innerHTML = '';
          return;
        }
        const totalConstr = byCat['공사'].length;
        const startedCount = byPhase['공사중'].length + byPhase['준공'].length; // 착공 완료
        const completedCount = byPhase['준공'].length;

        if (totalConstr === 0) {
          summaryEl.hidden = true;
          summaryEl.innerHTML = '';
          return;
        }

        if (curPhase === '발주준비') {
          summaryEl.innerHTML = summaryCard({
            title: '착공 진행 현황',
            num: startedCount,
            denom: totalConstr,
            color: 'bg-blue-500',
          });
        } else if (curPhase === '공사중') {
          const avgProgress = byPhase['공사중'].length === 0 ? 0
            : Math.round(byPhase['공사중'].reduce((s, p) => s + calcProgress(p), 0) / byPhase['공사중'].length);
          summaryEl.innerHTML = `
            <div class="bg-white rounded-xl border border-slate-200 p-3">
              <div class="flex items-baseline justify-between">
                <div class="text-xs font-bold text-slate-500">공사중 사업</div>
                <div class="text-xs text-slate-400">평균 공정률 ${avgProgress}%</div>
              </div>
              <div class="text-sm font-bold text-navy-dark mt-1">
                착공 후 진행 중 <span class="text-navy">${byPhase['공사중'].length}</span>건
              </div>
              <div class="mt-2 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                <div class="h-full bg-gold" style="width:${avgProgress}%"></div>
              </div>
            </div>`;
        } else { // 준공
          summaryEl.innerHTML = summaryCard({
            title: '준공 진행 현황',
            num: completedCount,
            denom: totalConstr,
            color: 'bg-emerald-500',
          });
        }
        summaryEl.hidden = false;
      }

      function projectCard(p) {
        const pr = calcProgress(p);
        const st = PROJECT_STATUS[p.status] || PROJECT_STATUS.active;
        const nm = nextMilestone(p);
        const m = p.members || {};
        return `
          <a href="/project.html?id=${encodeURIComponent(p.projectId)}"
            class="block bg-white rounded-xl border border-slate-200 p-4 hover:border-navy hover:shadow-sm transition-all">
            <div class="flex items-start justify-between gap-2">
              <div class="min-w-0">
                <div class="flex items-center gap-1.5 flex-wrap">
                  <span class="font-bold text-navy-dark">${escapeHtml(p.basicInfo.name)}</span>
                  <span class="text-[10px] font-bold px-1.5 py-0.5 rounded ${st.badge}">${st.label}</span>
                </div>
                <div class="text-xs text-slate-400 mt-0.5">${escapeHtml(p.projectId)} · ${escapeHtml(p.basicInfo.type || '')}</div>
              </div>
              <span class="shrink-0 text-sm font-bold text-navy">${pr}%</span>
            </div>
            <div class="mt-2 h-1.5 bg-slate-100 rounded-full overflow-hidden">
              <div class="h-full bg-gold" style="width:${pr}%"></div>
            </div>
            <div class="flex items-center justify-between mt-2 text-xs">
              <span class="text-slate-500">다음: <b class="text-navy-dark">${nm ? escapeHtml(nm.title) : '—'}</b></span>
              <span class="text-slate-400">${nm && nm.date ? formatDate(nm.date) : ''}</span>
            </div>
            <div class="text-[11px] text-slate-400 mt-1">시공 ${escapeHtml((m.contractor && m.contractor.org) || '미정')}${m.contractor && m.contractor.position ? ` ${escapeHtml(m.contractor.position)}` : ''} · 감리 ${escapeHtml((m.supervisor && m.supervisor.org) || '미정')}${m.supervisor && m.supervisor.position ? ` ${escapeHtml(m.supervisor.position)}` : ''}</div>
          </a>`;
      }

      function renderList() {
        const items = curCat === '용역' ? byCat['용역'] : byPhase[curPhase];
        if (items.length === 0) {
          listEl.innerHTML = '';
          emptyEl.hidden = false;
          if (projects.length === 0) {
            emptyEl.textContent = canEditProjects(user)
              ? '등록된 사업이 없습니다. 신규 사업을 등록해 보세요.'
              : '참여 중인 사업이 없습니다. 관리자에게 사업 배정을 요청하세요.';
          } else {
            emptyEl.textContent = curCat === '용역'
              ? '용역 사업이 없습니다.'
              : `${curPhase} 사업이 없습니다.`;
          }
          return;
        }
        emptyEl.hidden = true;
        listEl.innerHTML = items.map(projectCard).join('');
      }

      document.querySelectorAll('.tab-cat').forEach((btn) => {
        btn.addEventListener('click', () => {
          curCat = btn.dataset.cat;
          renderTabs();
          renderSummary();
          renderList();
        });
      });
      document.querySelectorAll('.tab-phase').forEach((btn) => {
        btn.addEventListener('click', () => {
          curPhase = btn.dataset.phase;
          renderTabs();
          renderSummary();
          renderList();
        });
      });

      renderTabs();
      renderSummary();
      renderList();
    })();
  </script>
</body>
</html>
