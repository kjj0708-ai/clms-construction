<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="시설공사 통합관리시스템 — 대시보드" />
  <title>대시보드 — CLMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CLMS" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <div id="header"></div>

  <main id="main" hidden class="max-w-5xl mx-auto px-4 py-6 clms-fade-in">

    <section class="bg-gradient-to-br from-navy to-navy-dark text-white rounded-2xl p-6 shadow-sm">
      <p class="text-white/60 text-sm">환영합니다</p>
      <h1 class="text-2xl font-bold mt-0.5"><span id="greet-name">사용자</span>님</h1>
      <p id="greet-sub" class="text-white/70 text-sm mt-1"></p>
    </section>

    <section id="install-banner" hidden
      class="mt-4 bg-gold/15 border border-gold/40 rounded-xl p-4 flex items-center justify-between gap-3">
      <div>
        <div class="text-sm font-bold text-navy-dark">앱으로 설치하기</div>
        <div class="text-xs text-slate-500">홈 화면에 추가하면 더 빠르게 접근할 수 있습니다.</div>
      </div>
      <button id="btn-install" class="shrink-0 px-4 py-2 rounded-lg bg-navy text-white text-sm font-semibold hover:bg-navy-light">설치</button>
    </section>

    <!-- 사업 현황 -->
    <section class="mt-4">
      <div class="flex items-center justify-between">
        <h2 class="text-sm font-bold text-slate-500">사업 현황</h2>
        <div class="flex gap-2">
          <a id="btn-new-project" href="/project-new.html" hidden
            class="text-xs font-bold text-navy hover:underline">+ 신규 사업</a>
          <a href="/projects.html" class="text-xs font-semibold text-slate-400 hover:text-navy">전체 보기 →</a>
        </div>
      </div>
      <div id="stats" class="grid grid-cols-4 gap-2 mt-2"></div>
      <div id="recent-projects" class="space-y-2 mt-3"></div>
    </section>

    <section class="mt-4 bg-white rounded-xl border border-slate-200 p-4">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-xs font-bold px-2 py-0.5 rounded bg-emerald-100 text-emerald-700">Phase 3 완료</span>
        <span class="text-sm font-semibold text-navy-dark">사업 등록 · 12단계 관리</span>
      </div>
      <p class="text-xs text-slate-500 mt-1.5">
        사업 등록·단계 추적·필수 서류 관리가 적용되었습니다. 다음 단계는 공지·댓글·푸시 알림(Phase 4)입니다.
      </p>
    </section>

    <h2 class="text-sm font-bold text-slate-500 mt-6 mb-2">바로가기</h2>
    <div id="available" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>

    <h2 class="text-sm font-bold text-slate-500 mt-6 mb-2">개발 로드맵</h2>
    <div id="roadmap" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>

  </main>
  <div id="footer"></div>

  <script type="module">
    import { onInstallAvailabilityChange, promptInstall } from '/js/app.js';
    import { mountAppHeader, mountFooter, toast } from '/js/components/layout.js';
    import { escapeHtml } from '/js/components/link-renderer.js';
    import { requireActive } from '/js/auth.js';
    import { roleLabel } from '/js/constants.js';
    import { stageName } from '/js/stages.js';
    import { listAccessibleProjects, canEditProjects, calcProgress, isDeadlineNear } from '/js/projects.js';

    (async () => {
      const user = await requireActive();
      if (!user) return;

      mountAppHeader(document.getElementById('header'), { user });
      mountFooter(document.getElementById('footer'));
      document.getElementById('main').hidden = false;

      document.getElementById('greet-name').textContent = user.name || '사용자';
      document.getElementById('greet-sub').textContent = `${user.department || ''} · ${roleLabel(user.role)}`;

      if (canEditProjects(user)) document.getElementById('btn-new-project').hidden = false;

      // 사업 현황
      const projects = await listAccessibleProjects(user);
      const inProgress = projects.filter((p) => p.status === 'active').length;
      const completed = projects.filter((p) => p.status === 'completed').length;
      const nearCount = projects.filter((p) => p.status === 'active' && isDeadlineNear(p)).length;

      const stats = [
        { label: '전체', value: projects.length, cls: 'text-navy-dark' },
        { label: '진행 중', value: inProgress, cls: 'text-blue-600' },
        { label: '완료', value: completed, cls: 'text-emerald-600' },
        { label: '기한 임박', value: nearCount, cls: nearCount ? 'text-red-600' : 'text-slate-400' },
      ];
      document.getElementById('stats').innerHTML = stats.map((s) => `
        <div class="bg-white rounded-xl border border-slate-200 p-3 text-center">
          <div class="text-2xl font-extrabold ${s.cls}">${s.value}</div>
          <div class="text-[11px] text-slate-400 mt-0.5">${s.label}</div>
        </div>`).join('');

      const recent = projects.slice(0, 4);
      const recentEl = document.getElementById('recent-projects');
      if (recent.length === 0) {
        recentEl.innerHTML = `
          <div class="bg-white rounded-xl border border-slate-200 p-6 text-center text-sm text-slate-400">
            조회 가능한 사업이 없습니다.${canEditProjects(user) ? ' 신규 사업을 등록해 보세요.' : ''}
          </div>`;
      } else {
        recentEl.innerHTML = recent.map((p) => {
          const progress = calcProgress(p);
          return `
            <a href="/project-detail.html?id=${encodeURIComponent(p.projectId)}"
              class="block bg-white rounded-xl border border-slate-200 p-3.5 hover:border-navy hover:shadow-sm transition-all">
              <div class="flex items-center justify-between gap-2">
                <span class="font-bold text-navy-dark truncate">${escapeHtml(p.basicInfo.name)}</span>
                <span class="shrink-0 text-xs font-bold text-navy">${progress}%</span>
              </div>
              <div class="mt-1.5 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                <div class="h-full bg-gold" style="width:${progress}%"></div>
              </div>
              <div class="text-xs text-slate-400 mt-1.5">${escapeHtml(p.projectId)} · ${p.currentStage}. ${stageName(p.currentStage)}</div>
            </a>`;
        }).join('');
      }

      // 바로가기
      const cards = [
        { href: '/projects.html', icon: '🏗️', title: '사업 목록', desc: '전체 사업 조회·검색' },
        { href: '/profile.html', icon: '👤', title: '내 정보', desc: '프로필·비밀번호 관리' },
        { href: '/test-components.html', icon: '🧩', title: '공통 컴포넌트 테스트', desc: '이미지·뷰어·링크·댓글' },
      ];
      if (user.role === 'system_admin') {
        cards.splice(1, 0,
          { href: '/admin/approvals.html', icon: '✅', title: '사용자 승인 관리', desc: '가입 신청 검토' },
          { href: '/admin/data-management.html', icon: '💾', title: '데이터 관리', desc: '백업·복원·보고서 출력' });
      }
      document.getElementById('available').innerHTML = cards.map((c) => `
        <a href="${c.href}" class="bg-white rounded-xl border border-slate-200 p-4 hover:border-navy hover:shadow-sm transition-all">
          <div class="text-2xl">${c.icon}</div>
          <div class="font-bold text-navy-dark mt-1">${c.title}</div>
          <div class="text-xs text-slate-500 mt-0.5">${c.desc}</div>
        </a>`).join('');

      // 개발 로드맵
      const roadmap = [
        { phase: 'Phase 4', title: '공지 + 댓글 + 푸시', desc: '게시글 CRUD, 2단계 댓글, FCM 푸시 알림', icon: '📢' },
        { phase: 'Phase 5', title: '협업 · 아카이브 · 점검', desc: '공사지시·질의응답·작업일지·안전점검', icon: '📂' },
        { phase: 'Phase 6', title: '보고서 + 데이터 이동성', desc: 'DOCX·XLSX 보고서, JSON 내보내기/가져오기', icon: '📊' },
      ];
      document.getElementById('roadmap').innerHTML = roadmap.map((m) => `
        <button data-phase="${m.phase}"
          class="text-left bg-white rounded-xl border border-slate-200 border-dashed p-4 hover:border-navy/50 transition-colors">
          <div class="flex items-center justify-between">
            <span class="text-2xl">${m.icon}</span>
            <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-slate-100 text-slate-500">${m.phase}</span>
          </div>
          <div class="font-bold text-navy-dark mt-1.5">${m.title}</div>
          <div class="text-xs text-slate-500 mt-0.5">${m.desc}</div>
        </button>`).join('');
      document.getElementById('roadmap').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-phase]');
        if (btn) toast(`${btn.dataset.phase} 기능은 개발 예정입니다.`, 'info');
      });

      // PWA 설치
      const banner = document.getElementById('install-banner');
      onInstallAvailabilityChange((available) => { banner.hidden = !available; });
      document.getElementById('btn-install').addEventListener('click', async () => {
        if (await promptInstall()) toast('앱이 설치되었습니다.', 'success');
      });
    })();
  </script>
</body>
</html>
