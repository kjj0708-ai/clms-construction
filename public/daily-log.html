<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="시설공사 통합관리시스템 — 작업일지" />
  <title>작업일지 — CLMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <div id="header"></div>

  <main class="max-w-2xl mx-auto px-4 py-6 clms-fade-in">
    <a id="back" href="/dashboard.html" class="text-slate-400 hover:text-navy text-sm">← 사업으로</a>

    <div id="content" hidden>
      <article class="bg-white rounded-2xl border border-slate-200 p-5 mt-2">
        <div class="flex items-start justify-between gap-2">
          <div>
            <span class="text-xs font-bold text-navy">📒 작업일지</span>
            <h1 id="l-date" class="text-xl font-bold text-navy-dark mt-1"></h1>
            <div id="l-author" class="text-xs text-slate-400 mt-0.5"></div>
          </div>
          <div id="post-actions"></div>
        </div>

        <dl id="l-fields" class="mt-3 bg-slate-50 rounded-xl p-3 text-sm"></dl>
        <div id="l-content" class="text-sm text-slate-700 mt-3 leading-relaxed break-words"></div>
        <div id="l-images" class="grid grid-cols-2 sm:grid-cols-3 gap-2 mt-3"></div>

        <!-- 감리 확인 -->
        <div id="l-confirm" class="mt-4 pt-3 border-t border-slate-100"></div>
      </article>

      <section class="bg-white rounded-2xl border border-slate-200 p-5 mt-4">
        <div id="comments"></div>
      </section>
    </div>

    <div id="loading" class="bg-white rounded-2xl border border-slate-200 p-10 text-center mt-4">
      <span class="clms-spinner clms-spinner--navy"></span>
      <p class="text-sm text-slate-400 mt-2">불러오는 중...</p>
    </div>
    <div id="denied" hidden class="bg-white rounded-2xl border border-slate-200 p-10 text-center mt-4">
      <p class="text-sm text-slate-500">작업일지를 찾을 수 없거나 조회 권한이 없습니다.</p>
      <a href="/dashboard.html" class="inline-block mt-3 text-navy font-semibold text-sm">대시보드로</a>
    </div>
  </main>
  <div id="footer"></div>

  <script type="module">
    import '/js/app.js';
    import { mountAppHeader, mountFooter, toast, confirmDialog } from '/js/components/layout.js';
    import { escapeHtml, renderTextWithLinks } from '/js/components/link-renderer.js';
    import { openImageViewer } from '/js/components/image-viewer.js';
    import { renderCommentThread } from '/js/components/comment-thread.js';
    import { mountPostActions } from '/js/components/post-actions.js';
    import { openDailyLogComposer } from '/js/components/archive-composers.js';
    import { requireActive } from '/js/auth.js';
    import { Db, nowIso } from '/js/backend.js';
    import { canViewProject } from '/js/projects.js';
    import { COLL, getDailyLog, confirmDailyLog, canConfirmDailyLog, softDeleteDailyLog, resolveDraftImages } from '/js/archive.js';
    import { notify } from '/js/notifications.js';

    const params = new URLSearchParams(location.search);
    const projectId = params.get('project');
    const logId = params.get('id');

    function fmtDateTime(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return '';
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    (async () => {
      const user = await requireActive();
      if (!user) return;
      mountAppHeader(document.getElementById('header'), { user });
      mountFooter(document.getElementById('footer'));

      const project = projectId ? await Db.getProject(projectId) : null;
      let log = (project && logId) ? await getDailyLog(projectId, logId) : null;

      document.getElementById('loading').hidden = true;
      if (!project || !log || log.deletedAt || !canViewProject(user, project)) {
        document.getElementById('denied').hidden = false;
        return;
      }
      document.getElementById('content').hidden = false;
      document.getElementById('back').href = `/project-detail.html?id=${encodeURIComponent(projectId)}`;

      function render() {
        document.getElementById('l-date').textContent = `${log.date} 작업일지`;
        document.getElementById('l-author').textContent =
          `${log.author.name} 작성 · ${fmtDateTime(log.createdAt)}${log.updatedAt ? ' (수정됨)' : ''}`;

        const rows = [
          ['날씨', log.weather], ['공정', log.process],
          ['투입 인원', log.workforce ? `${log.workforce}명` : '-'],
          ['진척률', (log.progress || 0) + '%'],
          ['투입 장비', log.equipment], ['자재 사용', log.materials],
        ];
        document.getElementById('l-fields').innerHTML = rows.map(([k, v]) => `
          <div class="flex justify-between gap-3 py-1">
            <dt class="text-slate-400 shrink-0">${k}</dt>
            <dd class="text-slate-700 font-medium text-right break-all">${escapeHtml(String(v || '-'))}</dd>
          </div>`).join('');

        let contentHtml = `<div class="font-semibold text-navy-dark text-sm">작업 내용</div>
          <div class="mt-1">${renderTextWithLinks(log.workContent || '-')}</div>`;
        if (log.safetyNotes) {
          contentHtml += `<div class="font-semibold text-navy-dark text-sm mt-3">안전 사항</div>
            <div class="mt-1">${renderTextWithLinks(log.safetyNotes)}</div>`;
        }
        document.getElementById('l-content').innerHTML = contentHtml;

        document.getElementById('l-images').innerHTML = (log.images || []).map((img, i) => `
          <img src="${img.thumbnailUrl || img.url}" data-img="${i}"
            class="w-full aspect-square object-cover rounded-lg border border-slate-200 cursor-pointer hover:opacity-90" alt="" />`).join('');

        // 감리 확인
        const confirmEl = document.getElementById('l-confirm');
        if (log.supervisorConfirm) {
          confirmEl.innerHTML = `
            <div class="flex items-center gap-2 text-sm">
              <span class="text-emerald-600 font-bold">✓ 감리 확인 완료</span>
              <span class="text-slate-400 text-xs">${escapeHtml(log.supervisorConfirm.name)} · ${fmtDateTime(log.supervisorConfirm.at)}</span>
            </div>
            ${log.supervisorConfirm.opinion ? `<div class="text-xs text-slate-500 mt-1">의견: ${escapeHtml(log.supervisorConfirm.opinion)}</div>` : ''}`;
        } else if (canConfirmDailyLog(user)) {
          confirmEl.innerHTML = `
            <div class="text-sm text-slate-500 mb-2">감리 일일 확인이 필요합니다.</div>
            <button id="btn-confirm" class="px-4 py-2 rounded-lg bg-navy text-white text-sm font-bold hover:bg-navy-light">감리 확인 서명</button>`;
          confirmEl.querySelector('#btn-confirm').addEventListener('click', async () => {
            const ok = await confirmDialog({ title: '감리 확인', message: '이 작업일지를 확인 처리하시겠습니까?', confirmText: '확인 서명' });
            if (!ok) return;
            log = await confirmDailyLog(project, log, user, '');
            render();
            toast('감리 확인이 완료되었습니다.', 'success');
          });
        } else {
          confirmEl.innerHTML = '<div class="text-sm text-slate-400">감리 확인 대기 중</div>';
        }

        mountPostActions(document.getElementById('post-actions'), {
          post: log, currentUser: user,
          onEdit: () => openDailyLogComposer({
            project, user, log,
            onSaved: async () => { log = await getDailyLog(projectId, logId); render(); },
          }),
          onDelete: async () => {
            await softDeleteDailyLog(project, log);
            setTimeout(() => location.href = `/project-detail.html?id=${encodeURIComponent(projectId)}`, 400);
          },
        });
      }

      document.getElementById('l-images').addEventListener('click', (e) => {
        const el = e.target.closest('[data-img]');
        if (el) openImageViewer(log.images.map((i) => i.url), { index: Number(el.dataset.img) });
      });

      render();

      // 댓글
      const mapComment = (c) => ({ ...c, id: c.commentId });
      const rawComments = await Db.listPostComments(projectId, COLL.logs, logId);
      const commentPath = `projects/${projectId}/dailyLogs/${logId}/comments`;
      renderCommentThread(document.getElementById('comments'), {
        currentUser: { uid: user.uid, name: user.name, role: user.role },
        comments: rawComments.map(mapComment),
        onCreate: async (draft) => {
          const images = await resolveDraftImages(draft.images, commentPath);
          const created = await Db.createPostComment(projectId, COLL.logs, logId, {
            parentCommentId: draft.parentCommentId || null,
            author: { uid: user.uid, name: user.name, role: user.role },
            content: draft.content, images,
            createdAt: nowIso(), updatedAt: null, deletedAt: null,
          });
          if (log.author.uid !== user.uid) {
            await notify(log.author.uid, {
              type: 'comment', title: `${user.name}님이 작업일지에 댓글을 남겼습니다`,
              body: draft.content.slice(0, 100),
              link: `/daily-log.html?project=${projectId}&id=${logId}`,
              projectId, targetId: logId,
            });
          }
          return mapComment(created);
        },
        onUpdate: async (id, draft) => {
          const patch = { content: draft.content, updatedAt: nowIso() };
          if (draft.images && draft.images.length) patch.images = await resolveDraftImages(draft.images, commentPath);
          await Db.updatePostComment(projectId, COLL.logs, logId, id, patch);
        },
        onDelete: async (id) => {
          await Db.updatePostComment(projectId, COLL.logs, logId, id, { deletedAt: nowIso() });
        },
      });
    })();
  </script>
</body>
</html>
