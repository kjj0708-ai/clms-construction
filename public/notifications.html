<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="시설공사 통합관리시스템 — 알림" />
  <title>알림 — CLMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <div id="header"></div>

  <main class="max-w-2xl mx-auto px-4 py-6 clms-fade-in">
    <div class="flex items-center justify-between">
      <div>
        <a href="/dashboard.html" class="text-slate-400 hover:text-navy text-sm">← 대시보드</a>
        <h1 class="text-xl font-bold text-navy-dark mt-0.5">알림</h1>
      </div>
      <button id="btn-read-all" class="text-xs font-semibold text-navy hover:underline">모두 읽음 처리</button>
    </div>

    <div class="flex gap-1 bg-white border border-slate-200 rounded-xl p-1 mt-4 w-fit">
      <button data-filter="all" class="px-4 py-1.5 rounded-lg text-sm font-semibold">전체</button>
      <button data-filter="unread" class="px-4 py-1.5 rounded-lg text-sm font-semibold">안 읽음 <span id="cnt-unread"></span></button>
    </div>

    <div id="list" class="mt-4 space-y-2"></div>
    <div id="empty" hidden class="bg-white rounded-xl border border-slate-200 p-10 text-center text-sm text-slate-400"></div>
  </main>
  <div id="footer"></div>

  <script type="module">
    import '/js/app.js';
    import { mountAppHeader, mountFooter, toast } from '/js/components/layout.js';
    import { escapeHtml } from '/js/components/link-renderer.js';
    import { requireActive } from '/js/auth.js';
    import { Db } from '/js/backend.js';
    import { NOTIFICATION_TYPES } from '/js/constants.js';
    import { listNotificationsSorted } from '/js/notifications.js';

    function fmtTime(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return '';
      const diff = (Date.now() - d.getTime()) / 1000;
      if (diff < 60) return '방금 전';
      if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
      if (diff < 604800) return `${Math.floor(diff/86400)}일 전`;
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    }

    (async () => {
      const user = await requireActive();
      if (!user) return;
      mountAppHeader(document.getElementById('header'), { user });
      mountFooter(document.getElementById('footer'));

      let notifications = await listNotificationsSorted(user.uid);
      let filter = 'all';

      const listEl = document.getElementById('list');
      const emptyEl = document.getElementById('empty');

      function render() {
        document.querySelectorAll('[data-filter]').forEach((b) => {
          const on = b.dataset.filter === filter;
          b.classList.toggle('bg-navy', on);
          b.classList.toggle('text-white', on);
          b.classList.toggle('text-slate-500', !on);
        });
        const unread = notifications.filter((n) => !n.read).length;
        document.getElementById('cnt-unread').textContent = unread ? `(${unread})` : '';

        const rows = filter === 'unread' ? notifications.filter((n) => !n.read) : notifications;
        if (rows.length === 0) {
          listEl.innerHTML = '';
          emptyEl.hidden = false;
          emptyEl.textContent = filter === 'unread' ? '읽지 않은 알림이 없습니다.' : '알림이 없습니다.';
          return;
        }
        emptyEl.hidden = true;
        listEl.innerHTML = rows.map((n) => {
          const t = NOTIFICATION_TYPES[n.type] || { icon: '🔔', label: '알림' };
          return `
            <button data-id="${n.id}" data-link="${escapeHtml(n.link || '')}"
              class="w-full text-left flex gap-3 rounded-xl border p-3.5 transition-colors
                ${n.read ? 'bg-white border-slate-200' : 'bg-navy/5 border-navy/20'}">
              <span class="text-xl shrink-0">${t.icon}</span>
              <div class="min-w-0 flex-1">
                <div class="flex items-center gap-1.5">
                  ${n.read ? '' : '<span class="w-1.5 h-1.5 rounded-full bg-red-500 shrink-0"></span>'}
                  <span class="text-sm font-semibold text-navy-dark truncate">${escapeHtml(n.title)}</span>
                </div>
                ${n.body ? `<div class="text-xs text-slate-500 mt-0.5 clms-clamp-2">${escapeHtml(n.body)}</div>` : ''}
                <div class="text-[11px] text-slate-400 mt-1">${t.label} · ${fmtTime(n.createdAt)}</div>
              </div>
            </button>`;
        }).join('');
      }

      listEl.addEventListener('click', async (e) => {
        const btn = e.target.closest('[data-id]');
        if (!btn) return;
        const id = btn.dataset.id;
        const notif = notifications.find((n) => n.id === id);
        if (notif && !notif.read) {
          notif.read = true;
          await Db.updateNotification(user.uid, id, { read: true });
        }
        const link = btn.dataset.link;
        if (link) location.href = link;
        else render();
      });

      document.getElementById('btn-read-all').addEventListener('click', async () => {
        await Db.markAllNotificationsRead(user.uid);
        notifications.forEach((n) => { n.read = true; });
        render();
        toast('모든 알림을 읽음 처리했습니다.', 'success');
      });

      document.querySelectorAll('[data-filter]').forEach((b) =>
        b.addEventListener('click', () => { filter = b.dataset.filter; render(); }));

      render();
    })();
  </script>
</body>
</html>
