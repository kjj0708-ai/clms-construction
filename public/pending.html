<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="시설공사 통합관리시스템 — 승인 대기" />
  <title>승인 대기 — CLMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <main class="min-h-screen flex flex-col items-center px-5 py-8">
    <div class="w-full max-w-md clms-fade-in">
      <div id="header"></div>

      <div id="card" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 text-center" hidden>
        <div class="w-16 h-16 mx-auto rounded-full bg-amber-100 flex items-center justify-center">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
          </svg>
        </div>
        <h2 class="mt-4 text-lg font-bold text-navy-dark">관리자 승인을 기다리고 있습니다</h2>
        <p class="text-sm text-slate-500 mt-1.5 leading-relaxed">
          입력하신 정보를 관리자가 확인하고 있습니다.<br />
          <b class="text-navy">영업일 기준 1일 이내</b> 처리될 예정입니다.
        </p>

        <div id="summary" class="mt-5 text-left bg-slate-50 rounded-xl p-4 space-y-2 text-sm"></div>

        <div class="mt-5 flex flex-col gap-2">
          <button id="btn-refresh"
            class="w-full py-3 rounded-xl font-semibold text-white bg-navy hover:bg-navy-light">
            승인 상태 새로고침
          </button>
          <div class="flex gap-2">
            <a href="/signup-info.html"
              class="flex-1 py-2.5 rounded-xl font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 text-center text-sm">정보 수정</a>
            <button id="btn-cancel"
              class="flex-1 py-2.5 rounded-xl font-medium text-red-600 bg-red-50 hover:bg-red-100 text-sm">신청 취소</button>
          </div>
        </div>

        <p class="text-[11px] text-slate-400 mt-4">이 화면은 5분마다 자동으로 승인 상태를 확인합니다.</p>
      </div>

      <div id="loading" class="bg-white rounded-2xl border border-slate-200 p-10 text-center">
        <span class="clms-spinner clms-spinner--navy"></span>
        <p class="text-sm text-slate-400 mt-2">불러오는 중...</p>
      </div>

      <div id="footer"></div>
    </div>
  </main>

  <script type="module">
    import './js/app.js';
    import { mountAuthHeader, mountFooter, toast, confirmDialog } from './js/components/layout.js';
    import { requirePending, resolveState, logout } from './js/auth.js';
    import { USER_TYPES } from './js/constants.js';

    mountAuthHeader(document.getElementById('header'));
    mountFooter(document.getElementById('footer'));

    (async () => {
      const user = await requirePending();
      if (!user) return; // 가드가 redirect 처리

      const rows = [
        ['이름', user.name], ['소속', user.department], ['직위', user.position],
        ['연락처', user.contact], ['이메일', user.email || '-'],
        ['사용자 유형', USER_TYPES[user.userType] || '-'],
      ];
      document.getElementById('summary').innerHTML = rows.map(([k, v]) => `
        <div class="flex justify-between gap-3">
          <span class="text-slate-400 shrink-0">${k}</span>
          <span class="text-slate-700 font-medium text-right break-all">${v || '-'}</span>
        </div>`).join('');

      document.getElementById('loading').hidden = true;
      document.getElementById('card').hidden = false;

      async function checkStatus(manual) {
        const st = await resolveState();
        if (st.state === 'active') { location.replace('/dashboard.html'); return; }
        if (st.state === 'inactive') { location.replace('/index.html?blocked=1'); return; }
        if (st.state === 'no-auth') { location.replace('/index.html'); return; }
        if (manual) toast('아직 승인 대기 중입니다.', 'info');
      }

      document.getElementById('btn-refresh').addEventListener('click', () => checkStatus(true));
      setInterval(() => checkStatus(false), 5 * 60 * 1000);

      document.getElementById('btn-cancel').addEventListener('click', async () => {
        const ok = await confirmDialog({
          title: '신청 취소',
          message: '가입 신청을 취소하고 로그아웃하시겠습니까?',
          confirmText: '신청 취소',
          danger: true,
        });
        if (ok) logout();
      });
    })();
  </script>
</body>
</html>
