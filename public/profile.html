<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="시설공사 통합관리시스템 — 내 정보" />
  <title>내 정보 — CLMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <div id="header"></div>

  <main class="max-w-md mx-auto px-4 py-6 clms-fade-in">
    <div class="flex items-center gap-2">
      <a href="/dashboard.html" class="text-slate-400 hover:text-navy text-sm">← 대시보드</a>
    </div>
    <h1 class="text-xl font-bold text-navy-dark mt-1">내 정보</h1>

    <div id="content" hidden>
      <!-- 기본 정보 -->
      <section class="bg-white rounded-2xl border border-slate-200 p-5 mt-4">
        <h2 class="font-bold text-navy-dark">기본 정보</h2>
        <div id="account-meta" class="mt-2 flex flex-wrap gap-1.5"></div>
        <form id="profile-form" class="space-y-3 mt-4" novalidate>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">이름</label>
            <input name="name" type="text" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">소속</label>
            <input name="department" type="text" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">직위</label>
            <input name="position" type="text" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">연락처</label>
            <input name="contact" type="tel" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">이메일</label>
            <input name="email" type="email" disabled class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm bg-slate-100 text-slate-500" />
          </div>
          <button type="submit" id="btn-save" class="w-full py-3 rounded-xl font-bold text-white bg-navy hover:bg-navy-light">저장</button>
        </form>
      </section>

      <!-- 비밀번호 변경 (이메일 계정 전용) -->
      <section id="password-section" class="bg-white rounded-2xl border border-slate-200 p-5 mt-4" hidden>
        <h2 class="font-bold text-navy-dark">비밀번호 변경</h2>
        <form id="password-form" class="space-y-3 mt-3" novalidate>
          <input name="newPassword" type="password" placeholder="새 비밀번호 (8자 이상, 영문+숫자)" autocomplete="new-password"
            class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
          <input name="confirmPassword" type="password" placeholder="새 비밀번호 확인" autocomplete="new-password"
            class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
          <button type="submit" class="w-full py-2.5 rounded-xl font-semibold text-navy bg-slate-100 hover:bg-slate-200">비밀번호 변경</button>
        </form>
      </section>

      <!-- 알림 설정 (Phase 4) -->
      <section class="bg-white rounded-2xl border border-slate-200 border-dashed p-5 mt-4">
        <h2 class="font-bold text-slate-400">알림 설정</h2>
        <p class="text-xs text-slate-400 mt-1">푸시 알림 종류별 on/off 설정은 Phase 4(푸시 알림)에서 제공됩니다.</p>
      </section>
    </div>

    <div id="loading" class="bg-white rounded-2xl border border-slate-200 p-10 text-center mt-4">
      <span class="clms-spinner clms-spinner--navy"></span>
      <p class="text-sm text-slate-400 mt-2">불러오는 중...</p>
    </div>
  </main>
  <div id="footer"></div>

  <script type="module">
    import '/js/app.js';
    import { mountAppHeader, mountFooter, toast } from '/js/components/layout.js';
    import { requireActive, getCurrentUser } from '/js/auth.js';
    import { Auth, Db } from '/js/backend.js';
    import { roleLabel, roleBadgeClass, USER_TYPES } from '/js/constants.js';

    const PHONE_RE = /^01[016789]-?\d{3,4}-?\d{4}$/;

    (async () => {
      const user = await requireActive();
      if (!user) return;

      mountAppHeader(document.getElementById('header'), { user });
      mountFooter(document.getElementById('footer'));

      const form = document.getElementById('profile-form');
      for (const f of ['name', 'department', 'position', 'contact', 'email']) {
        if (user[f] != null) form.elements[f].value = user[f];
      }
      document.getElementById('account-meta').innerHTML = `
        <span class="text-[11px] font-bold px-2 py-0.5 rounded ${roleBadgeClass(user.role)}">${roleLabel(user.role)}</span>
        <span class="text-[11px] font-bold px-2 py-0.5 rounded bg-emerald-100 text-emerald-700">활성</span>
        <span class="text-[11px] text-slate-400 px-1 py-0.5">${USER_TYPES[user.userType] || ''} · ${user.authProvider || ''} 로그인</span>`;

      if (user.authProvider === 'email') {
        document.getElementById('password-section').hidden = false;
      }

      document.getElementById('loading').hidden = true;
      document.getElementById('content').hidden = false;

      // 기본 정보 저장
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());
        for (const [field, label] of [['name', '이름'], ['department', '소속'], ['position', '직위'], ['contact', '연락처']]) {
          if (!String(data[field] || '').trim()) { toast(`${label}을(를) 입력해 주세요.`, 'warning'); return; }
        }
        if (!PHONE_RE.test(data.contact.replace(/\s/g, ''))) {
          toast('연락처 형식이 올바르지 않습니다.', 'warning'); return;
        }
        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        try {
          await Db.updateUser(user.uid, {
            name: data.name.trim(), department: data.department.trim(),
            position: data.position.trim(), contact: data.contact.trim(),
          });
          await getCurrentUser({ force: true });
          toast('정보가 저장되었습니다.', 'success');
        } catch (err) {
          console.error(err);
          toast('저장 중 오류가 발생했습니다.', 'error');
        } finally {
          btn.disabled = false;
        }
      });

      // 비밀번호 변경
      const pwForm = document.getElementById('password-form');
      pwForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const np = pwForm.elements.newPassword.value;
        const cp = pwForm.elements.confirmPassword.value;
        if (np.length < 8 || !/[a-zA-Z]/.test(np) || !/\d/.test(np)) {
          toast('비밀번호는 8자 이상, 영문과 숫자를 포함해야 합니다.', 'warning'); return;
        }
        if (np !== cp) { toast('비밀번호가 일치하지 않습니다.', 'warning'); return; }
        try {
          await Auth.changePassword(np);
          pwForm.reset();
          toast('비밀번호가 변경되었습니다.', 'success');
        } catch (err) {
          console.error(err);
          toast(err.message || '비밀번호 변경 중 오류가 발생했습니다.', 'error');
        }
      });
    })();
  </script>
</body>
</html>
