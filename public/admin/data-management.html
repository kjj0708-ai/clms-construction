<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="시설공사 통합관리시스템 — 데이터 관리" />
  <title>데이터 관리 — CLMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <div id="header"></div>

  <main class="max-w-2xl mx-auto px-4 py-6 clms-fade-in">
    <a href="/dashboard.html" class="text-slate-400 hover:text-navy text-sm">← 대시보드</a>
    <h1 class="text-xl font-bold text-navy-dark mt-1">데이터 관리</h1>
    <p class="text-xs text-slate-500 mt-0.5">데이터 백업·복원 및 보고서 출력 (시스템 관리자 전용)</p>

    <div id="content" hidden>
      <div id="fb-note" hidden class="mt-4 text-xs bg-amber-50 text-amber-700 border border-amber-200 rounded-lg px-3 py-2">
        Firebase 모드에서는 JSON 내보내기/가져오기 대신 Firestore 콘솔 또는 gcloud 를 이용하세요.
      </div>

      <!-- 전체 내보내기 -->
      <section class="bg-white rounded-2xl border border-slate-200 p-5 mt-4">
        <h2 class="font-bold text-navy-dark">전체 데이터 내보내기</h2>
        <p class="text-xs text-slate-500 mt-1">모든 사업·게시글·사용자 데이터를 JSON 파일로 백업합니다.</p>
        <button id="btn-export-all" class="mt-3 px-4 py-2.5 rounded-xl bg-navy text-white text-sm font-bold hover:bg-navy-light">전체 JSON 내보내기</button>
      </section>

      <!-- 보고서 -->
      <section class="bg-white rounded-2xl border border-slate-200 p-5 mt-4">
        <h2 class="font-bold text-navy-dark">보고서 출력</h2>
        <p class="text-xs text-slate-500 mt-1">전체 사업 현황을 엑셀로 출력합니다.</p>
        <button id="btn-xlsx" class="mt-3 px-4 py-2.5 rounded-xl bg-emerald-600 text-white text-sm font-bold hover:bg-emerald-700">사업 일람 (XLSX)</button>
      </section>

      <!-- 사업별 내보내기 -->
      <section class="bg-white rounded-2xl border border-slate-200 p-5 mt-4">
        <h2 class="font-bold text-navy-dark">사업별 내보내기</h2>
        <div id="project-list" class="mt-3 space-y-2"></div>
      </section>

      <!-- 가져오기 -->
      <section class="bg-white rounded-2xl border border-slate-200 p-5 mt-4">
        <h2 class="font-bold text-navy-dark">데이터 가져오기</h2>
        <p class="text-xs text-slate-500 mt-1">CLMS 에서 내보낸 JSON 파일을 업로드해 데이터를 복원합니다.</p>
        <button id="btn-pick" class="mt-3 w-full py-4 rounded-xl border-2 border-dashed border-slate-300 text-slate-500 hover:border-navy hover:text-navy text-sm font-semibold">JSON 파일 선택</button>
        <input id="import-file" type="file" accept="application/json,.json" hidden />

        <div id="import-preview" hidden class="mt-3">
          <div class="bg-slate-50 rounded-xl p-3 text-sm">
            <div class="font-bold text-navy-dark mb-1">가져올 데이터 미리보기</div>
            <dl id="preview-body" class="space-y-1"></dl>
          </div>
          <div class="mt-3">
            <div class="text-sm font-semibold text-slate-700 mb-1">충돌 처리</div>
            <label class="flex items-center gap-2 text-sm py-1">
              <input type="radio" name="strategy" value="skip" checked /> 건너뛰기 (기존 데이터 유지)
            </label>
            <label class="flex items-center gap-2 text-sm py-1">
              <input type="radio" name="strategy" value="overwrite" /> 덮어쓰기 (가져온 데이터로 교체)
            </label>
          </div>
          <button id="btn-import" class="mt-2 w-full py-2.5 rounded-xl bg-navy text-white text-sm font-bold hover:bg-navy-light">가져오기 실행</button>
        </div>

        <div id="import-report" hidden class="mt-3 bg-emerald-50 rounded-xl p-3 text-sm"></div>
      </section>
    </div>

    <div id="loading" class="bg-white rounded-2xl border border-slate-200 p-10 text-center mt-4">
      <span class="clms-spinner clms-spinner--navy"></span>
      <p class="text-sm text-slate-400 mt-2">불러오는 중...</p>
    </div>
  </main>
  <div id="footer"></div>

  <script type="module">
    import '/js/app.js';
    import { mountAppHeader, mountFooter, toast, confirmDialog } from '/js/components/layout.js';
    import { escapeHtml } from '/js/components/link-renderer.js';
    import { requireRole } from '/js/auth.js';
    import { Db, isMock } from '/js/backend.js';
    import { buildFullExport, buildProjectExport, envelopeToBlob, readJsonFile, summarizeEnvelope, applyImport } from '/js/data-io.js';
    import { generateProjectListXlsx, downloadBlob } from '/js/reports.js';

    function stamp() {
      const d = new Date();
      return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
    }

    (async () => {
      const admin = await requireRole(['system_admin']);
      if (!admin) return;
      mountAppHeader(document.getElementById('header'), { user: admin });
      mountFooter(document.getElementById('footer'));

      document.getElementById('loading').hidden = true;
      document.getElementById('content').hidden = false;
      if (!isMock) document.getElementById('fb-note').hidden = false;

      const projects = await Db.listProjects();
      document.getElementById('project-list').innerHTML = projects.length === 0
        ? '<p class="text-sm text-slate-400">사업이 없습니다.</p>'
        : projects.map((p) => `
            <div class="flex items-center justify-between gap-2 border border-slate-100 rounded-lg px-3 py-2">
              <div class="min-w-0">
                <div class="text-sm font-semibold text-navy-dark truncate">${escapeHtml(p.basicInfo.name)}</div>
                <div class="text-xs text-slate-400">${escapeHtml(p.projectId)}</div>
              </div>
              <button data-export="${escapeHtml(p.projectId)}" class="shrink-0 px-3 py-1.5 rounded-lg bg-slate-100 text-navy text-xs font-semibold hover:bg-slate-200">내보내기</button>
            </div>`).join('');

      // 전체 내보내기
      document.getElementById('btn-export-all').addEventListener('click', async () => {
        try {
          const envelope = await buildFullExport(admin);
          downloadBlob(envelopeToBlob(envelope), `clms_full_export_${stamp()}.json`);
          toast('전체 데이터를 내보냈습니다.', 'success');
        } catch (err) {
          console.error(err);
          toast(err.message || '내보내기 중 오류가 발생했습니다.', 'error');
        }
      });

      // 사업별 내보내기
      document.getElementById('project-list').addEventListener('click', async (e) => {
        const btn = e.target.closest('[data-export]');
        if (!btn) return;
        try {
          const envelope = await buildProjectExport(btn.dataset.export, admin);
          downloadBlob(envelopeToBlob(envelope), `${btn.dataset.export}_export_${stamp()}.json`);
          toast('사업 데이터를 내보냈습니다.', 'success');
        } catch (err) {
          console.error(err);
          toast(err.message || '내보내기 중 오류가 발생했습니다.', 'error');
        }
      });

      // 사업 일람 XLSX
      document.getElementById('btn-xlsx').addEventListener('click', async () => {
        try {
          const { blob, filename } = await generateProjectListXlsx(projects);
          downloadBlob(blob, filename);
          toast('사업 일람 엑셀을 생성했습니다.', 'success');
        } catch (err) {
          console.error(err);
          toast(err.message || '보고서 생성 중 오류가 발생했습니다.', 'error');
        }
      });

      // 가져오기
      let loadedEnvelope = null;
      const fileInput = document.getElementById('import-file');
      document.getElementById('btn-pick').addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', async () => {
        const file = fileInput.files[0];
        if (!file) return;
        try {
          loadedEnvelope = await readJsonFile(file);
          const summary = summarizeEnvelope(loadedEnvelope);
          document.getElementById('preview-body').innerHTML = `
            <div class="flex justify-between"><dt class="text-slate-400">내보내기 유형</dt><dd class="font-medium">${escapeHtml(summary.exportType)}</dd></div>
            <div class="flex justify-between"><dt class="text-slate-400">내보낸 사람</dt><dd class="font-medium">${escapeHtml(summary.exportedBy)}</dd></div>
            ${Object.entries(summary.counts).map(([k, v]) => `<div class="flex justify-between"><dt class="text-slate-400">${k}</dt><dd class="font-medium">${v}건</dd></div>`).join('')}`;
          document.getElementById('import-preview').hidden = false;
          document.getElementById('import-report').hidden = true;
        } catch (err) {
          console.error(err);
          loadedEnvelope = null;
          document.getElementById('import-preview').hidden = true;
          toast(err.message || '파일을 읽지 못했습니다.', 'error');
        }
      });

      document.getElementById('btn-import').addEventListener('click', async () => {
        if (!loadedEnvelope) return;
        const strategy = document.querySelector('input[name="strategy"]:checked').value;
        const ok = await confirmDialog({
          title: '데이터 가져오기',
          message: `'${strategy === 'overwrite' ? '덮어쓰기' : '건너뛰기'}' 방식으로 가져오시겠습니까?`,
          confirmText: '가져오기',
          danger: strategy === 'overwrite',
        });
        if (!ok) return;
        try {
          const report = await applyImport(loadedEnvelope, strategy);
          document.getElementById('import-report').hidden = false;
          document.getElementById('import-report').innerHTML = `
            <div class="font-bold text-emerald-700">가져오기 완료</div>
            <div class="mt-1 text-slate-600">신규 생성 ${report.created}건 · 덮어쓰기 ${report.overwritten}건 · 건너뜀 ${report.skipped}건</div>`;
          toast('데이터 가져오기가 완료되었습니다.', 'success');
        } catch (err) {
          console.error(err);
          toast(err.message || '가져오기 중 오류가 발생했습니다.', 'error');
        }
      });
    })();
  </script>
</body>
</html>
