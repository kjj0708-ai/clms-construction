<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="공사관리시스템 — 가입 정보 입력" />
  <title>가입 정보 입력 — CMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <main class="min-h-screen flex flex-col items-center px-5 py-8">
    <div class="w-full max-w-md clms-fade-in">
      <div id="header"></div>

      <div id="card" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6" hidden>
        <h2 id="form-title" class="text-lg font-bold text-navy-dark">가입 정보 입력</h2>
        <p class="text-xs text-slate-500 mt-1">
          시스템 사용을 위해 아래 정보를 입력해 주세요.
          입력하신 정보는 <b class="text-navy">관리자 승인</b> 후 사용할 수 있습니다.
        </p>

        <form id="signup-form" class="space-y-3.5 mt-4" novalidate>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">이름 <span class="text-red-500">*</span></label>
            <input name="name" type="text" required placeholder="실명을 입력하세요"
              class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">소속 <span class="text-red-500">*</span></label>
            <input name="department" type="text" required placeholder="부서명 또는 회사명"
              class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">직위 <span class="text-red-500">*</span></label>
            <input name="position" type="text" required placeholder="직책 또는 직급"
              class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">연락처 <span class="text-red-500">*</span></label>
            <input name="contact" type="tel" required placeholder="010-0000-0000"
              class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">이메일 <span id="email-req" class="text-red-500" hidden>*</span></label>
            <input name="email" type="email" placeholder="example@email.com"
              class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30 disabled:bg-slate-100 disabled:text-slate-500" />
            <p id="email-note" class="text-[11px] text-slate-400 mt-0.5"></p>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">사용자 유형 <span class="text-red-500">*</span></label>
            <select name="userType" required
              class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-navy/30">
              <option value="">선택하세요</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">비고</label>
            <textarea name="note" rows="2" placeholder="자기소개 또는 요청사항 (선택)"
              class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm resize-y focus:outline-none focus:ring-2 focus:ring-navy/30"></textarea>
          </div>

          <div class="flex gap-2 pt-2">
            <button type="button" id="btn-cancel"
              class="flex-1 py-3 rounded-xl font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200">취소</button>
            <button type="submit" id="btn-submit"
              class="flex-[2] py-3 rounded-xl font-bold text-white bg-navy hover:bg-navy-light">승인 신청</button>
          </div>
        </form>
      </div>

      <div id="loading" class="bg-white rounded-2xl border border-slate-200 p-10 text-center">
        <span class="clms-spinner clms-spinner--navy"></span>
        <p class="text-sm text-slate-400 mt-2">불러오는 중...</p>
      </div>

      <div id="footer"></div>
    </div>
  </main>

  <script type="module">
    import './js/app.js';
    import { mountAuthHeader, mountFooter, toast } from './js/components/layout.js';
    import { requireSignup, logout } from './js/auth.js';
    import { Db, nowIso, normalizePhone } from './js/backend.js';
    import { USER_TYPES } from './js/constants.js';

    mountAuthHeader(document.getElementById('header'));
    mountFooter(document.getElementById('footer'));

    const typeSelect = document.querySelector('select[name="userType"]');
    for (const [value, label] of Object.entries(USER_TYPES)) {
      typeSelect.insertAdjacentHTML('beforeend', `<option value="${value}">${label}</option>`);
    }

    function phoneToLocal(e164) {
      if (!e164) return '';
      const d = String(e164).replace(/^\+82/, '0').replace(/[^\d]/g, '');
      return d.length >= 10 ? d.replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-$2-$3') : d;
    }

    const PHONE_RE = /^01[016789]-?\d{3,4}-?\d{4}$/;

    (async () => {
      const ctx = await requireSignup();
      if (!ctx) return; // 가드가 redirect 처리

      const { authUser, user } = ctx;
      const editing = ctx.state === 'pending';
      const form = document.getElementById('signup-form');

      document.getElementById('form-title').textContent = editing ? '가입 정보 수정' : '가입 정보 입력';
      document.getElementById('btn-submit').textContent = editing ? '수정 후 재신청' : '승인 신청';

      // 프리필
      if (user) {
        for (const f of ['name', 'department', 'position', 'contact', 'email', 'userType', 'note']) {
          if (user[f] != null && form.elements[f]) form.elements[f].value = user[f];
        }
      }
      // 이메일 처리 — 구글·이메일 가입자는 이메일 고정, 휴대폰 가입자는 선택 입력
      const emailInput = form.elements.email;
      const emailNote = document.getElementById('email-note');
      if (authUser.provider === 'google' || authUser.provider === 'email') {
        if (authUser.email) emailInput.value = authUser.email;
        emailInput.disabled = true;
        emailNote.textContent = '로그인 계정의 이메일이 자동 입력되었습니다.';
      } else {
        emailNote.textContent = '휴대폰 로그인 사용자는 이메일을 선택 입력합니다.';
        if (!form.elements.contact.value && authUser.phone) {
          form.elements.contact.value = phoneToLocal(authUser.phone);
        }
      }

      document.getElementById('loading').hidden = true;
      document.getElementById('card').hidden = false;

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());
        if (emailInput.disabled) data.email = authUser.email || '';

        for (const [field, label] of [['name', '이름'], ['department', '소속'], ['position', '직위'], ['contact', '연락처'], ['userType', '사용자 유형']]) {
          if (!String(data[field] || '').trim()) {
            toast(`${label}을(를) 입력해 주세요.`, 'warning');
            form.elements[field].focus();
            return;
          }
        }
        if (!PHONE_RE.test(data.contact.replace(/\s/g, ''))) {
          toast('연락처 형식이 올바르지 않습니다. (예: 010-1234-5678)', 'warning');
          form.elements.contact.focus();
          return;
        }

        const submitBtn = document.getElementById('btn-submit');
        submitBtn.disabled = true;
        try {
          const userInfo = {
            name: data.name.trim(), department: data.department.trim(),
            position: data.position.trim(), contact: data.contact.trim(),
            email: (data.email || '').trim(), userType: data.userType, note: (data.note || '').trim(),
          };
          // users 문서 저장 (pending 상태)
          await Db.setUser(authUser.uid, {
            uid: authUser.uid, ...userInfo,
            role: 'pending', status: 'pending', accessibleProjects: [],
            authProvider: authUser.provider,
            createdAt: (user && user.createdAt) || nowIso(),
            approvedAt: null, approvedBy: null, lastLoginAt: nowIso(),
          });
          // 승인 요청 — 기존 요청이 있으면 갱신, 없으면 생성
          const existing = await Db.findApprovalRequestByUser(authUser.uid);
          if (existing && existing.status === 'pending') {
            await Db.updateApprovalRequest(existing.requestId, { userInfo, requestedAt: nowIso() });
          } else {
            await Db.createApprovalRequest({
              userId: authUser.uid, userInfo, requestedAt: nowIso(),
              status: 'pending', processedAt: null, processedBy: null, rejectionReason: null,
            });
          }
          toast(editing ? '수정되어 재신청되었습니다.' : '승인 신청이 접수되었습니다.', 'success');
          setTimeout(() => location.href = '/pending.html', 600);
        } catch (err) {
          console.error(err);
          toast('저장 중 오류가 발생했습니다.', 'error');
          submitBtn.disabled = false;
        }
      });

      document.getElementById('btn-cancel').addEventListener('click', () => logout());
    })();
  </script>
</body>
</html>
