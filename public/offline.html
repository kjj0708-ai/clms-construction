<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오프라인 — CMS</title>
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #1a3a5c; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px; text-align: center;
    }
    .box { max-width: 360px; }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { color: #c9d4e0; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #c9a961; color: #1a3a5c; border: 0;
      padding: 12px 28px; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>오프라인 상태입니다</h1>
    <p>네트워크 연결을 확인해 주세요.<br />연결이 복구되면 자동으로 동기화됩니다.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
  <script>
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
