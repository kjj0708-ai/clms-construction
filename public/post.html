<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="시설공사 통합관리시스템 — 협업 게시글" />
  <title>협업 게시글 — CLMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <div id="header"></div>

  <main class="max-w-2xl mx-auto px-4 py-6 clms-fade-in">
    <a id="back" href="/dashboard.html" class="text-slate-400 hover:text-navy text-sm">← 사업으로</a>

    <div id="content" hidden>
      <article class="bg-white rounded-2xl border border-slate-200 p-5 mt-2">
        <div class="flex items-start justify-between gap-2">
          <div class="flex items-center gap-1.5 flex-wrap">
            <span id="p-type" class="text-xs font-bold text-navy"></span>
            <span id="p-status"></span>
          </div>
          <div id="post-actions"></div>
        </div>
        <h1 id="p-title" class="text-xl font-bold text-navy-dark mt-2"></h1>
        <div class="flex items-center gap-2 mt-1.5 text-xs text-slate-400">
          <span id="p-author" class="font-semibold text-slate-600"></span>
          <span id="p-date"></span>
          <button id="p-edited" hidden class="text-navy underline">수정됨</button>
        </div>

        <dl id="p-extra" class="mt-3 bg-slate-50 rounded-xl p-3 text-sm"></dl>
        <div id="p-images" class="grid grid-cols-2 sm:grid-cols-3 gap-2 mt-3"></div>
        <div id="p-content" class="text-sm text-slate-700 mt-3 leading-relaxed break-words"></div>

        <div id="p-transitions" class="flex flex-wrap gap-2 mt-4"></div>
        <div id="p-history" class="mt-3"></div>
        <div id="p-readstat" class="mt-3 pt-3 border-t border-slate-100 text-xs text-slate-400"></div>
      </article>

      <section class="bg-white rounded-2xl border border-slate-200 p-5 mt-4">
        <div id="comments"></div>
      </section>
    </div>

    <div id="loading" class="bg-white rounded-2xl border border-slate-200 p-10 text-center mt-4">
      <span class="clms-spinner clms-spinner--navy"></span>
      <p class="text-sm text-slate-400 mt-2">불러오는 중...</p>
    </div>
    <div id="denied" hidden class="bg-white rounded-2xl border border-slate-200 p-10 text-center mt-4">
      <p class="text-sm text-slate-500">게시글을 찾을 수 없거나 조회 권한이 없습니다.</p>
      <a href="/dashboard.html" class="inline-block mt-3 text-navy font-semibold text-sm">대시보드로</a>
    </div>
  </main>
  <div id="footer"></div>

  <script type="module">
    import '/js/app.js';
    import { mountAppHeader, mountFooter, toast, confirmDialog } from '/js/components/layout.js';
    import { escapeHtml, renderTextWithLinks } from '/js/components/link-renderer.js';
    import { openImageViewer } from '/js/components/image-viewer.js';
    import { renderCommentThread } from '/js/components/comment-thread.js';
    import { mountPostActions } from '/js/components/post-actions.js';
    import { openPostComposer } from '/js/components/post-composer.js';
    import { requireActive } from '/js/auth.js';
    import { Db } from '/js/backend.js';
    import { getPostType, statusInfo } from '/js/post-types.js';
    import { canViewProject } from '/js/projects.js';
    import { markPostRead, availableTransitions, applyTransition, softDeletePost,
             listComments, createComment, updateComment, softDeleteComment, resolveDraftImages } from '/js/board.js';

    const params = new URLSearchParams(location.search);
    const projectId = params.get('project');
    const typeKey = params.get('type');
    const postId = params.get('id');

    function fmtDateTime(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return '';
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    (async () => {
      const user = await requireActive();
      if (!user) return;
      mountAppHeader(document.getElementById('header'), { user });
      mountFooter(document.getElementById('footer'));

      const t = getPostType(typeKey);
      const project = projectId ? await Db.getProject(projectId) : null;
      let post = (t && project && postId) ? await Db.getPost(projectId, t.collection, postId) : null;

      document.getElementById('loading').hidden = true;
      if (!t || !project || !post || post.deletedAt || !canViewProject(user, project)) {
        document.getElementById('denied').hidden = false;
        return;
      }
      document.getElementById('content').hidden = false;
      document.getElementById('back').href = `/project-detail.html?id=${encodeURIComponent(projectId)}`;

      post = await markPostRead(typeKey, projectId, post, user.uid) || post;

      function render() {
        document.getElementById('p-type').textContent = `${t.icon} ${t.label}`;
        const si = statusInfo(typeKey, post.status);
        document.getElementById('p-status').innerHTML =
          `<span class="text-[10px] font-bold px-2 py-0.5 rounded ${si.badge}">${si.label}</span>`;
        document.getElementById('p-title').textContent = post.title;
        document.getElementById('p-author').textContent =
          `${post.author.name} (${post.author.department || post.author.role || ''})`;
        document.getElementById('p-date').textContent = fmtDateTime(post.createdAt);
        document.getElementById('p-edited').hidden = !post.updatedAt;

        // 추가 필드
        const extra = post.extra || {};
        document.getElementById('p-extra').innerHTML = t.extraFields.map((f) => `
          <div class="flex justify-between gap-3 py-1">
            <dt class="text-slate-400 shrink-0">${f.label}</dt>
            <dd class="text-slate-700 font-medium text-right break-all">${escapeHtml(String(extra[f.key] || '-'))}</dd>
          </div>`).join('');

        // 이미지
        const imgWrap = document.getElementById('p-images');
        imgWrap.innerHTML = (post.images || []).map((img, i) => `
          <img src="${img.thumbnailUrl || img.url}" data-img="${i}"
            class="w-full aspect-square object-cover rounded-lg border border-slate-200 cursor-pointer hover:opacity-90" alt="" />`).join('');

        document.getElementById('p-content').innerHTML = renderTextWithLinks(post.content);

        // 상태 전환 버튼
        const trWrap = document.getElementById('p-transitions');
        const transitions = availableTransitions(typeKey, post, user);
        trWrap.innerHTML = transitions.map((tr, i) => `
          <button data-tr="${i}" class="px-4 py-2 rounded-lg bg-navy text-white text-sm font-bold hover:bg-navy-light">${tr.label}</button>`).join('');
        trWrap._transitions = transitions;

        // 상태 이력
        const hist = post.statusHistory || [];
        document.getElementById('p-history').innerHTML = hist.length ? `
          <div class="text-xs text-slate-400">진행 이력</div>
          <ol class="mt-1 space-y-1">
            ${hist.map((h) => `<li class="text-xs text-slate-500 flex gap-2">
              <span class="font-semibold text-navy-dark">${escapeHtml(h.label || h.status)}</span>
              <span>${escapeHtml(h.byName || '')} · ${fmtDateTime(h.at)}</span></li>`).join('')}
          </ol>` : '';

        const readers = Object.keys(post.readBy || {});
        document.getElementById('p-readstat').textContent = `읽음 ${readers.length}명`;

        mountPostActions(document.getElementById('post-actions'), {
          post, currentUser: user,
          onEdit: () => openPostComposer({
            typeKey, project, user, post,
            onSaved: async () => { post = await Db.getPost(projectId, t.collection, postId); render(); },
          }),
          onDelete: async () => {
            await softDeletePost(typeKey, project, post);
            setTimeout(() => location.href = `/project-detail.html?id=${encodeURIComponent(projectId)}`, 400);
          },
        });
      }

      document.getElementById('p-images').addEventListener('click', (e) => {
        const el = e.target.closest('[data-img]');
        if (el) openImageViewer(post.images.map((i) => i.url), { index: Number(el.dataset.img) });
      });

      document.getElementById('p-transitions').addEventListener('click', async (e) => {
        const btn = e.target.closest('[data-tr]');
        if (!btn) return;
        const transition = e.currentTarget._transitions[Number(btn.dataset.tr)];
        const ok = await confirmDialog({
          title: '상태 변경',
          message: `'${transition.label}' 처리하시겠습니까?`,
          confirmText: transition.label,
          danger: transition.to === 'rejected',
        });
        if (!ok) return;
        try {
          post = await applyTransition(typeKey, project, post, transition, user);
          render();
          toast(`상태가 '${statusInfo(typeKey, post.status).label}'(으)로 변경되었습니다.`, 'success');
        } catch (err) {
          console.error(err);
          toast('상태 변경 중 오류가 발생했습니다.', 'error');
        }
      });

      document.getElementById('p-edited').addEventListener('click', () => {
        const revs = post.revisions || [];
        const overlay = document.createElement('div');
        overlay.className = 'fixed inset-0 z-[10000] flex items-center justify-center bg-black/50 p-4';
        overlay.innerHTML = `
          <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-5 clms-fade-in max-h-[85vh] overflow-y-auto">
            <h3 class="font-bold text-navy-dark">수정 이력 (${revs.length}건)</h3>
            <div class="mt-3 space-y-3">
              ${revs.slice().reverse().map((r) => `
                <div class="border border-slate-100 rounded-lg p-3">
                  <div class="text-xs text-slate-400">${fmtDateTime(r.editedAt)} 수정 전</div>
                  <div class="text-sm font-semibold text-slate-700 mt-1">${escapeHtml(r.previousTitle)}</div>
                  <div class="text-xs text-slate-500 mt-0.5 whitespace-pre-line">${escapeHtml(r.previousContent)}</div>
                </div>`).join('') || '<p class="text-sm text-slate-400">이력이 없습니다.</p>'}
            </div>
            <button data-close class="w-full mt-4 py-2.5 rounded-xl font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200">닫기</button>
          </div>`;
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay || e.target.dataset.close !== undefined) overlay.remove();
        });
        document.body.appendChild(overlay);
      });

      render();

      // 댓글
      const mapComment = (c) => ({ ...c, id: c.commentId });
      const rawComments = await listComments(typeKey, projectId, postId);
      renderCommentThread(document.getElementById('comments'), {
        currentUser: { uid: user.uid, name: user.name, role: user.role },
        comments: rawComments.map(mapComment),
        onCreate: async (draft) => {
          const images = await resolveDraftImages(draft.images, `projects/${projectId}/${t.collection}/${postId}/comments`);
          const created = await createComment(typeKey, project, post, user, { ...draft, images });
          post = await Db.getPost(projectId, t.collection, postId);
          return mapComment(created);
        },
        onUpdate: async (id, draft) => {
          const patch = { content: draft.content };
          if (draft.images && draft.images.length) {
            patch.images = await resolveDraftImages(draft.images, `projects/${projectId}/${t.collection}/${postId}/comments`);
          }
          await updateComment(typeKey, projectId, postId, id, patch);
        },
        onDelete: async (id) => { await softDeleteComment(typeKey, projectId, postId, id); },
      });
    })();
  </script>
</body>
</html>
