<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="시설공사 통합관리시스템 — 공지사항" />
  <title>공지사항 — CLMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <div id="header"></div>

  <main class="max-w-2xl mx-auto px-4 py-6 clms-fade-in">
    <a id="back" href="/dashboard.html" class="text-slate-400 hover:text-navy text-sm">← 사업으로</a>

    <div id="content" hidden>
      <article class="bg-white rounded-2xl border border-slate-200 p-5 mt-2">
        <div class="flex items-start justify-between gap-2">
          <div class="flex items-center gap-1.5 flex-wrap">
            <span id="n-priority"></span>
            <span class="text-xs text-slate-400" id="n-project"></span>
          </div>
          <div id="post-actions"></div>
        </div>
        <h1 id="n-title" class="text-xl font-bold text-navy-dark mt-2"></h1>
        <div class="flex items-center gap-2 mt-1.5 text-xs text-slate-400">
          <span id="n-author" class="font-semibold text-slate-600"></span>
          <span id="n-date"></span>
          <button id="n-edited" hidden class="text-navy underline">수정됨</button>
        </div>
        <div id="n-images" class="grid grid-cols-2 sm:grid-cols-3 gap-2 mt-3"></div>
        <div id="n-content" class="text-sm text-slate-700 mt-3 leading-relaxed break-words"></div>
        <div id="n-readstat" class="mt-4 pt-3 border-t border-slate-100 text-xs text-slate-400"></div>
      </article>

      <section class="bg-white rounded-2xl border border-slate-200 p-5 mt-4">
        <div id="comments"></div>
      </section>
    </div>

    <div id="loading" class="bg-white rounded-2xl border border-slate-200 p-10 text-center mt-4">
      <span class="clms-spinner clms-spinner--navy"></span>
      <p class="text-sm text-slate-400 mt-2">불러오는 중...</p>
    </div>
    <div id="denied" hidden class="bg-white rounded-2xl border border-slate-200 p-10 text-center mt-4">
      <p class="text-sm text-slate-500">공지를 찾을 수 없거나 조회 권한이 없습니다.</p>
      <a href="/dashboard.html" class="inline-block mt-3 text-navy font-semibold text-sm">대시보드로</a>
    </div>
  </main>
  <div id="footer"></div>

  <script type="module">
    import '/js/app.js';
    import { mountAppHeader, mountFooter, toast, confirmDialog } from '/js/components/layout.js';
    import { escapeHtml, renderTextWithLinks } from '/js/components/link-renderer.js';
    import { openImageViewer } from '/js/components/image-viewer.js';
    import { renderCommentThread } from '/js/components/comment-thread.js';
    import { mountPostActions } from '/js/components/post-actions.js';
    import { openNoticeComposer } from '/js/components/notice-composer.js';
    import { requireActive } from '/js/auth.js';
    import { Db } from '/js/backend.js';
    import { NOTICE_PRIORITIES } from '/js/constants.js';
    import { canViewProject } from '/js/projects.js';
    import { markNoticeRead, createComment, updateComment, softDeleteComment, softDeleteNotice, resolveDraftImages } from '/js/notices.js';

    const params = new URLSearchParams(location.search);
    const projectId = params.get('project');
    const noticeId = params.get('id');

    function fmtDateTime(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return '';
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    (async () => {
      const user = await requireActive();
      if (!user) return;
      mountAppHeader(document.getElementById('header'), { user });
      mountFooter(document.getElementById('footer'));

      const project = projectId ? await Db.getProject(projectId) : null;
      let notice = (project && noticeId) ? await Db.getNotice(projectId, noticeId) : null;

      document.getElementById('loading').hidden = true;
      if (!project || !notice || notice.deletedAt || !canViewProject(user, project)) {
        document.getElementById('denied').hidden = false;
        return;
      }
      document.getElementById('content').hidden = false;
      document.getElementById('back').href = `/project-detail.html?id=${encodeURIComponent(projectId)}`;

      // 읽음 처리
      notice = await markNoticeRead(projectId, notice, user.uid) || notice;

      function renderNotice() {
        const pr = NOTICE_PRIORITIES[notice.priority] || NOTICE_PRIORITIES.normal;
        document.getElementById('n-priority').innerHTML =
          `<span class="text-[10px] font-bold px-2 py-0.5 rounded ${pr.badge}">${pr.label}</span>`;
        document.getElementById('n-project').textContent = `${project.basicInfo.name} · 공지사항`;
        document.getElementById('n-title').textContent = notice.title;
        document.getElementById('n-author').textContent =
          `${notice.author.name} (${notice.author.department || ''})`;
        document.getElementById('n-date').textContent = fmtDateTime(notice.createdAt);
        document.getElementById('n-edited').hidden = !notice.updatedAt;
        document.getElementById('n-content').innerHTML = renderTextWithLinks(notice.content);

        const imgWrap = document.getElementById('n-images');
        if (notice.images && notice.images.length) {
          imgWrap.innerHTML = notice.images.map((img, i) => `
            <img src="${img.thumbnailUrl || img.url}" data-img="${i}"
              class="w-full aspect-square object-cover rounded-lg border border-slate-200 cursor-pointer hover:opacity-90" alt="" />`).join('');
        } else {
          imgWrap.innerHTML = '';
        }

        // 읽음 통계
        const readers = Object.keys(notice.readBy || {});
        const isAuthor = notice.author.uid === user.uid || user.role === 'system_admin';
        document.getElementById('n-readstat').textContent =
          `읽음 ${readers.length}명${isAuthor ? ' (작성자는 읽은 사람을 확인할 수 있습니다)' : ''}`;

        // 작성자 액션
        mountPostActions(document.getElementById('post-actions'), {
          post: notice, currentUser: user,
          onEdit: () => openNoticeComposer({
            project, user, notice,
            onSaved: async () => { notice = await Db.getNotice(projectId, noticeId); renderNotice(); },
          }),
          onDelete: async () => {
            await softDeleteNotice(project, notice);
            setTimeout(() => location.href = `/project-detail.html?id=${encodeURIComponent(projectId)}`, 400);
          },
        });
      }

      document.getElementById('n-images').addEventListener('click', (e) => {
        const el = e.target.closest('[data-img]');
        if (el) openImageViewer(notice.images.map((i) => i.url), { index: Number(el.dataset.img) });
      });

      // 수정 이력 모달
      document.getElementById('n-edited').addEventListener('click', () => {
        const revs = notice.revisions || [];
        const overlay = document.createElement('div');
        overlay.className = 'fixed inset-0 z-[10000] flex items-center justify-center bg-black/50 p-4';
        overlay.innerHTML = `
          <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-5 clms-fade-in max-h-[85vh] overflow-y-auto">
            <h3 class="font-bold text-navy-dark">수정 이력 (${revs.length}건)</h3>
            <div class="mt-3 space-y-3">
              ${revs.slice().reverse().map((r) => `
                <div class="border border-slate-100 rounded-lg p-3">
                  <div class="text-xs text-slate-400">${fmtDateTime(r.editedAt)} 수정 전</div>
                  <div class="text-sm font-semibold text-slate-700 mt-1">${escapeHtml(r.previousTitle)}</div>
                  <div class="text-xs text-slate-500 mt-0.5 whitespace-pre-line">${escapeHtml(r.previousContent)}</div>
                </div>`).join('') || '<p class="text-sm text-slate-400">이력이 없습니다.</p>'}
            </div>
            <button data-close class="w-full mt-4 py-2.5 rounded-xl font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200">닫기</button>
          </div>`;
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay || e.target.dataset.close !== undefined) overlay.remove();
        });
        document.body.appendChild(overlay);
      });

      renderNotice();

      // 댓글 스레드
      const mapComment = (c) => ({ ...c, id: c.commentId });
      const rawComments = await Db.listComments(projectId, noticeId);
      const commentPath = `projects/${projectId}/notices/${noticeId}/comments`;

      renderCommentThread(document.getElementById('comments'), {
        currentUser: { uid: user.uid, name: user.name, role: user.role },
        comments: rawComments.map(mapComment),
        onCreate: async (draft) => {
          const images = await resolveDraftImages(draft.images, commentPath);
          const created = await createComment(project, notice, user, { ...draft, images });
          notice = await Db.getNotice(projectId, noticeId);
          return mapComment(created);
        },
        onUpdate: async (id, draft) => {
          const patch = { content: draft.content };
          if (draft.images && draft.images.length) {
            patch.images = await resolveDraftImages(draft.images, commentPath);
          }
          await updateComment(project, noticeId, id, patch);
        },
        onDelete: async (id) => {
          await softDeleteComment(project, noticeId, id);
        },
      });
    })();
  </script>
</body>
</html>
