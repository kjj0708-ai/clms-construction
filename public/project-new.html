<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="공사관리시스템 — 사업 등록" />
  <title>사업 등록 — CMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <div id="header"></div>

  <main class="max-w-xl mx-auto px-4 py-6 clms-fade-in">
    <a id="back" href="/dashboard.html" class="text-slate-400 hover:text-navy text-sm">← 목록</a>
    <h1 id="page-title" class="text-xl font-bold text-navy-dark mt-1">신규 사업 등록</h1>

    <form id="form" class="mt-4 space-y-5" novalidate hidden>
      <!-- 개요 -->
      <section class="bg-white rounded-2xl border border-slate-200 p-5 space-y-3">
        <h2 class="font-bold text-navy-dark text-sm">사업 개요</h2>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">사업명 <span class="text-red-500">*</span></label>
          <input name="name" type="text" placeholder="예: 행복로 도로개설공사" class="inp" />
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">사업유형 <span class="text-red-500">*</span></label>
            <select name="type" class="inp bg-white"><option value="">선택</option></select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">부서코드 <span class="text-red-500">*</span></label>
            <input name="deptCode" type="text" placeholder="DOSI" maxlength="8" class="inp uppercase" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">발주부서 <span class="text-red-500">*</span></label>
          <input name="department" type="text" placeholder="예: 도시주택국 건축과" class="inp" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">사업 위치</label>
          <input name="location" type="text" placeholder="예: ○○시 ○○구 행복로 일원" class="inp" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">사업 개요</label>
          <textarea name="summary" rows="2" placeholder="한두 줄 요약" class="inp resize-y"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">착수예정일</label>
            <input name="startDate" type="date" class="inp" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">준공예정일</label>
            <input name="endDate" type="date" class="inp" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">총사업비 (원)</label>
          <input name="totalBudget" type="number" min="0" placeholder="예: 4800000000" class="inp" />
          <p id="budget-preview" class="text-[11px] text-navy mt-0.5"></p>
        </div>
        <div data-edit-only hidden>
          <label class="block text-sm font-semibold text-slate-700 mb-1">사업 상태</label>
          <select name="status" class="inp bg-white">
            <option value="active">진행 중</option>
            <option value="completed">완료</option>
            <option value="suspended">중단</option>
          </select>
        </div>
      </section>

      <!-- 참여자 -->
      <section class="bg-white rounded-2xl border border-slate-200 p-5 space-y-4">
        <h2 class="font-bold text-navy-dark text-sm">참여자</h2>
        <p class="text-[11px] text-slate-400 -mt-2">연락처를 입력하면 해당 담당자가 가입 시 사업을 조회할 수 있습니다.</p>

        <div class="space-y-2">
          <div class="text-xs font-bold text-navy">감독공무원</div>
          <div class="grid grid-cols-3 gap-2">
            <input name="officerName" type="text" placeholder="이름" class="inp" />
            <input name="officerOrg" type="text" placeholder="소속" class="inp" />
            <input name="officerContact" type="tel" placeholder="연락처" class="inp" />
          </div>
        </div>
        <div class="space-y-2">
          <div class="text-xs font-bold text-amber-600">시공사</div>
          <div class="grid grid-cols-3 gap-2">
            <input name="contractorName" type="text" placeholder="현장소장" class="inp" />
            <input name="contractorOrg" type="text" placeholder="회사명" class="inp" />
            <input name="contractorContact" type="tel" placeholder="연락처" class="inp" />
          </div>
        </div>
        <div class="space-y-2">
          <div class="text-xs font-bold text-emerald-700">감리</div>
          <div class="grid grid-cols-3 gap-2">
            <input name="supervisorName" type="text" placeholder="책임감리" class="inp" />
            <input name="supervisorOrg" type="text" placeholder="감리사명" class="inp" />
            <input name="supervisorContact" type="tel" placeholder="연락처" class="inp" />
          </div>
        </div>
      </section>

      <div class="flex gap-2">
        <a href="/dashboard.html" class="flex-1 py-3 rounded-xl font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 text-center">취소</a>
        <button type="submit" id="submit" class="flex-[2] py-3 rounded-xl font-bold text-white bg-navy hover:bg-navy-light">등록</button>
      </div>
    </form>

    <div id="loading" class="bg-white rounded-2xl border border-slate-200 p-10 text-center mt-4">
      <span class="clms-spinner clms-spinner--navy"></span>
      <p class="text-sm text-slate-400 mt-2">불러오는 중...</p>
    </div>
  </main>
  <div id="footer"></div>

  <style>
    .inp { width:100%; border:1px solid #e2e8f0; border-radius:.5rem; padding:.55rem .75rem; font-size:.875rem; outline:none; }
    .inp:focus { box-shadow:0 0 0 2px rgba(26,58,92,.3); }
  </style>

  <script type="module">
    import '/js/app.js';
    import { mountAppHeader, mountFooter, toast } from '/js/components/layout.js';
    import { requireActive } from '/js/auth.js';
    import { Db, nowIso } from '/js/backend.js';
    import { PROJECT_TYPES, PROJECT_EDITOR_ROLES } from '/js/constants.js';
    import { canEditProjects, canViewProject, formatBudget } from '/js/projects.js';

    const editId = new URLSearchParams(location.search).get('id');

    (async () => {
      const user = await requireActive();
      if (!user) return;
      mountAppHeader(document.getElementById('header'), { user });
      mountFooter(document.getElementById('footer'));

      if (!canEditProjects(user)) {
        document.getElementById('loading').innerHTML = '<p class="text-sm text-slate-500">사업을 등록·수정할 권한이 없습니다.</p>';
        return;
      }

      const form = document.getElementById('form');
      const typeSel = form.elements.type;
      PROJECT_TYPES.forEach((t) => typeSel.insertAdjacentHTML('beforeend', `<option value="${t}">${t}</option>`));

      let existing = null;
      if (editId) {
        existing = await Db.getProject(editId);
        if (!existing || !canViewProject(user, existing)) {
          document.getElementById('loading').innerHTML = '<p class="text-sm text-slate-500">사업을 찾을 수 없습니다.</p>';
          return;
        }
        document.getElementById('page-title').textContent = '사업 정보 수정';
        document.getElementById('submit').textContent = '저장';
        document.getElementById('back').href = '/project.html?id=' + encodeURIComponent(editId);
        document.querySelectorAll('[data-edit-only]').forEach((el) => el.hidden = false);

        const b = existing.basicInfo || {}, m = existing.members || {};
        form.elements.name.value = b.name || '';
        form.elements.type.value = b.type || '';
        form.elements.deptCode.value = existing.deptCode || '';
        form.elements.deptCode.disabled = true;
        form.elements.department.value = b.department || '';
        form.elements.location.value = b.location || '';
        form.elements.summary.value = b.summary || '';
        form.elements.startDate.value = b.startDate || '';
        form.elements.endDate.value = b.endDate || '';
        form.elements.totalBudget.value = b.totalBudget || '';
        form.elements.status.value = existing.status || 'active';
        const fill = (role) => {
          form.elements[role + 'Name'].value = (m[role] && m[role].name) || '';
          form.elements[role + 'Org'].value = (m[role] && m[role].org) || '';
          form.elements[role + 'Contact'].value = (m[role] && m[role].contact) || '';
        };
        fill('officer'); fill('contractor'); fill('supervisor');
      } else {
        // 신규: 감독공무원 기본값 = 현재 사용자
        form.elements.officerName.value = user.name || '';
        form.elements.officerOrg.value = user.department || '';
        form.elements.officerContact.value = user.contact || '';
        if (user.department) form.elements.department.value = user.department;
      }

      document.getElementById('loading').hidden = true;
      form.hidden = false;

      form.elements.totalBudget.addEventListener('input', () => {
        const v = Number(form.elements.totalBudget.value);
        document.getElementById('budget-preview').textContent = v ? formatBudget(v) : '';
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const f = Object.fromEntries(new FormData(form).entries());
        for (const [k, label] of [['name', '사업명'], ['type', '사업유형'], ['department', '발주부서']]) {
          if (!String(f[k] || '').trim()) { toast(`${label}을(를) 입력해 주세요.`, 'warning'); form.elements[k].focus(); return; }
        }
        if (!editId && !/^[A-Za-z0-9]{2,8}$/.test((f.deptCode || '').trim())) {
          toast('부서코드는 영문·숫자 2~8자로 입력해 주세요.', 'warning'); return;
        }
        if (f.startDate && f.endDate && f.endDate < f.startDate) {
          toast('준공예정일은 착수예정일 이후여야 합니다.', 'warning'); return;
        }

        const member = (role, keepUid) => {
          const name = (f[role + 'Name'] || '').trim();
          const org = (f[role + 'Org'] || '').trim();
          const contact = (f[role + 'Contact'] || '').trim();
          return { uid: keepUid || null, name, org, contact };
        };
        const basicInfo = {
          name: f.name.trim(), type: f.type, department: f.department.trim(),
          location: (f.location || '').trim(), summary: (f.summary || '').trim(),
          startDate: f.startDate || '', endDate: f.endDate || '',
          totalBudget: Number(f.totalBudget) || 0,
        };

        const submitBtn = document.getElementById('submit');
        submitBtn.disabled = true;
        try {
          if (editId) {
            const m = existing.members || {};
            await Db.updateProject(editId, {
              basicInfo, status: f.status || 'active',
              members: {
                officer: member('officer', m.officer && m.officer.uid),
                contractor: member('contractor', m.contractor && m.contractor.uid),
                supervisor: member('supervisor', m.supervisor && m.supervisor.uid),
              },
            });
            toast('저장되었습니다.', 'success');
            setTimeout(() => location.href = '/project.html?id=' + encodeURIComponent(editId), 500);
          } else {
            const project = await Db.createProject({
              deptCode: f.deptCode.trim().toUpperCase(),
              basicInfo,
              members: {
                officer: member('officer', user.uid),       // 등록자(감독공무원)에 연결
                contractor: member('contractor', null),
                supervisor: member('supervisor', null),
              },
              progress: [],
              createdAt: nowIso(), createdBy: user.uid, updatedAt: nowIso(), status: 'active',
            });
            toast(`사업이 등록되었습니다. (${project.projectId})`, 'success');
            setTimeout(() => location.href = '/project.html?id=' + encodeURIComponent(project.projectId), 600);
          }
        } catch (err) {
          console.error(err);
          toast('저장 중 오류가 발생했습니다.', 'error');
          submitBtn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
