<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="시설공사 통합관리시스템 — 점검 결과" />
  <title>점검 결과 — CLMS</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
</head>
<body class="min-h-full bg-slate-100">
  <div id="header"></div>

  <main class="max-w-2xl mx-auto px-4 py-6 clms-fade-in">
    <a id="back" href="/dashboard.html" class="text-slate-400 hover:text-navy text-sm">← 사업으로</a>

    <div id="content" hidden>
      <article class="bg-white rounded-2xl border border-slate-200 p-5 mt-2">
        <div class="flex items-start justify-between gap-2">
          <div>
            <span class="text-xs font-bold text-navy">🦺 안전·품질 점검</span>
            <h1 id="i-type" class="text-xl font-bold text-navy-dark mt-1"></h1>
            <div id="i-meta" class="text-xs text-slate-400 mt-0.5"></div>
          </div>
          <span id="i-overall"></span>
        </div>

        <div class="mt-4">
          <div class="text-sm font-bold text-navy-dark mb-1.5">점검 항목</div>
          <div id="i-checklist" class="space-y-1.5"></div>
        </div>

        <div class="mt-5">
          <div class="text-sm font-bold text-navy-dark mb-1.5">3자 확인 서명</div>
          <div id="i-signatures" class="grid grid-cols-3 gap-2"></div>
        </div>
      </article>
    </div>

    <div id="loading" class="bg-white rounded-2xl border border-slate-200 p-10 text-center mt-4">
      <span class="clms-spinner clms-spinner--navy"></span>
      <p class="text-sm text-slate-400 mt-2">불러오는 중...</p>
    </div>
    <div id="denied" hidden class="bg-white rounded-2xl border border-slate-200 p-10 text-center mt-4">
      <p class="text-sm text-slate-500">점검 기록을 찾을 수 없거나 조회 권한이 없습니다.</p>
      <a href="/dashboard.html" class="inline-block mt-3 text-navy font-semibold text-sm">대시보드로</a>
    </div>
  </main>
  <div id="footer"></div>

  <script type="module">
    import '/js/app.js';
    import { mountAppHeader, mountFooter, toast } from '/js/components/layout.js';
    import { escapeHtml } from '/js/components/link-renderer.js';
    import { openImageViewer } from '/js/components/image-viewer.js';
    import { openSignaturePad } from '/js/components/signature-pad.js';
    import { requireActive } from '/js/auth.js';
    import { Db } from '/js/backend.js';
    import { canViewProject } from '/js/projects.js';
    import { getInspection, addSignature, RESULT_INFO, OVERALL_INFO, roleSlot, slotLabel } from '/js/inspections.js';

    const params = new URLSearchParams(location.search);
    const projectId = params.get('project');
    const inspectionId = params.get('id');

    function fmtDateTime(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return '';
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    (async () => {
      const user = await requireActive();
      if (!user) return;
      mountAppHeader(document.getElementById('header'), { user });
      mountFooter(document.getElementById('footer'));

      const project = projectId ? await Db.getProject(projectId) : null;
      let inspection = (project && inspectionId) ? await getInspection(projectId, inspectionId) : null;

      document.getElementById('loading').hidden = true;
      if (!project || !inspection || inspection.deletedAt || !canViewProject(user, project)) {
        document.getElementById('denied').hidden = false;
        return;
      }
      document.getElementById('content').hidden = false;
      document.getElementById('back').href = `/project-detail.html?id=${encodeURIComponent(projectId)}`;

      const mySlot = roleSlot(user.role);

      function render() {
        document.getElementById('i-type').textContent = inspection.typeLabel;
        document.getElementById('i-meta').textContent =
          `점검자 ${inspection.inspector.name} · ${fmtDateTime(inspection.inspectedAt)}`;
        const oi = OVERALL_INFO[inspection.overallResult] || OVERALL_INFO.pass;
        document.getElementById('i-overall').innerHTML =
          `<span class="text-xs font-bold px-2.5 py-1 rounded ${oi.badge}">${oi.label}</span>`;

        document.getElementById('i-checklist').innerHTML = inspection.checklist.map((item) => {
          const ri = RESULT_INFO[item.result] || RESULT_INFO.good;
          return `
            <div class="border border-slate-100 rounded-lg p-2.5">
              <div class="flex items-center justify-between gap-2">
                <span class="text-sm text-slate-700">${escapeHtml(item.itemName)}</span>
                <span class="shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded ${ri.badge}">${ri.label}</span>
              </div>
              ${item.memo ? `<div class="text-xs text-slate-500 mt-1">${escapeHtml(item.memo)}</div>` : ''}
              ${item.correctiveActionId
                ? `<a href="/corrective-action.html?project=${encodeURIComponent(projectId)}&id=${encodeURIComponent(item.correctiveActionId)}"
                     class="inline-block mt-1 text-xs font-semibold text-navy hover:underline">시정조치 보기 →</a>` : ''}
            </div>`;
        }).join('');

        const slots = ['contractor', 'supervisor', 'officer'];
        document.getElementById('i-signatures').innerHTML = slots.map((slot) => {
          const sig = inspection.signatures[slot];
          if (sig) {
            return `
              <div class="border border-slate-200 rounded-lg p-2 text-center">
                <div class="text-[11px] font-bold text-slate-500">${slotLabel(slot)}</div>
                <img src="${sig.image}" class="w-full h-14 object-contain mt-1" alt="서명" />
                <div class="text-[10px] text-slate-600 font-semibold mt-0.5">${escapeHtml(sig.name)}</div>
                <div class="text-[9px] text-slate-400">${fmtDateTime(sig.signedAt)}</div>
              </div>`;
          }
          const canSign = mySlot === slot;
          return `
            <div class="border border-dashed border-slate-300 rounded-lg p-2 text-center flex flex-col items-center justify-center min-h-[96px]">
              <div class="text-[11px] font-bold text-slate-400">${slotLabel(slot)}</div>
              ${canSign
                ? `<button data-sign="${slot}" class="mt-1.5 px-2.5 py-1 rounded-md bg-navy text-white text-[11px] font-bold">서명하기</button>`
                : '<div class="text-[10px] text-slate-300 mt-1">미서명</div>'}
            </div>`;
        }).join('');
      }
      render();

      document.getElementById('i-signatures').addEventListener('click', async (e) => {
        const btn = e.target.closest('[data-sign]');
        if (!btn) return;
        const image = await openSignaturePad({ title: `${slotLabel(btn.dataset.sign)} 입회 확인 서명` });
        if (!image) return;
        try {
          inspection = await addSignature(project, inspection, user, image);
          render();
          toast('서명이 등록되었습니다.', 'success');
        } catch (err) {
          console.error(err);
          toast(err.message || '서명 등록 중 오류가 발생했습니다.', 'error');
        }
      });
    })();
  </script>
</body>
</html>
